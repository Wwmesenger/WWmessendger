<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ww - Мессенджер с настройками темы</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style id="theme-style">
        :root {
            --bg-primary: #000000;
            --bg-secondary: #0c0c0c;
            --bg-tertiary: #050505;
            --bg-hover: #141414;
            --bg-active: #1e2a1e;
            --border-color: #1f1f1f;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --text-muted: #666666;
            --message-outgoing: #2b6e4c;
            --message-incoming: #202020;
            --accent-color: #4caf50;
            --avatar-bg: #202020;
            --input-bg: #1a1a1a;
            --input-border: #2c2c2c;
            --modal-bg: #131313;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            transition: background 0.2s ease, color 0.2s ease;
        }
        
        .app {
            display: flex;
            height: 100vh;
            width: 100%;
        }
        
        .sidebar {
            width: 320px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }
        
        .sidebar-header {
            padding: 16px 20px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo span {
            background: var(--text-primary);
            color: var(--bg-primary);
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 26px;
            font-weight: 900;
        }
        
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-tertiary);
        }
        
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
            font-size: 14px;
            font-weight: 500;
        }
        
        .tab.active {
            color: var(--accent-color);
            border-bottom: 2px solid var(--accent-color);
        }
        
        .settings-btn {
            background: var(--avatar-bg);
            border: none;
            color: var(--text-primary);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .connection-status {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            background: #2a2a2a;
        }
        
        .connection-status.online {
            background: var(--accent-color);
        }
        
        .search-container {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .search-input {
            width: 100%;
            padding: 10px 16px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-primary);
            border-radius: 24px;
            outline: none;
            font-size: 14px;
        }
        
        .search-input:focus {
            border-color: var(--accent-color);
        }
        
        .search-results {
            background: var(--bg-hover);
            border-radius: 12px;
            margin-top: 8px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .search-result-item {
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
        }
        
        .search-result-item:hover {
            background: var(--bg-active);
        }
        
        .user-profile {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
        }
        
        .avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: var(--avatar-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: bold;
            overflow: hidden;
            position: relative;
            flex-shrink: 0;
        }
        
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .online-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent-color);
            position: absolute;
            bottom: 2px;
            right: 2px;
            border: 2px solid var(--bg-secondary);
        }
        
        .user-info {
            flex: 1;
            min-width: 0;
        }
        
        .user-name {
            font-weight: 700;
            font-size: 15px;
        }
        
        .user-bio {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .user-peer-id {
            font-size: 10px;
            color: #6a6a6a;
            margin-top: 2px;
            word-break: break-all;
        }
        
        .copy-id-btn {
            background: var(--avatar-bg);
            border: none;
            color: var(--text-primary);
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 10px;
            cursor: pointer;
            margin-left: 8px;
        }
        
        .chats-list, .channels-list {
            flex: 1;
            overflow-y: auto;
        }
        
        .create-channel-btn {
            background: var(--accent-color);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 24px;
            font-size: 12px;
            cursor: pointer;
            margin: 12px 16px;
            width: calc(100% - 32px);
        }
        
        .chat-item, .channel-item {
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
        }
        
        .chat-item:hover, .channel-item:hover {
            background: var(--bg-hover);
        }
        
        .chat-item.active, .channel-item.active {
            background: var(--bg-active);
            border-left: 3px solid var(--accent-color);
        }
        
        .chat-avatar, .channel-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--avatar-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            overflow: hidden;
            flex-shrink: 0;
        }
        
        .chat-details, .channel-details {
            flex: 1;
            min-width: 0;
        }
        
        .chat-name, .channel-name {
            font-weight: 600;
            font-size: 15px;
        }
        
        .chat-last-msg {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
        }
        
        .chat-header {
            padding: 16px 24px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .chat-contact {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        
        .call-buttons {
            display: flex;
            gap: 18px;
        }
        
        .call-btn {
            background: var(--avatar-bg);
            border: none;
            color: var(--text-primary);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 22px;
        }
        
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .message {
            max-width: 70%;
            padding: 10px 16px;
            border-radius: 22px;
            animation: fadeIn 0.2s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px);}
            to { opacity: 1; transform: translateY(0);}
        }
        
        .message.outgoing {
            background: var(--message-outgoing);
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }
        
        .message.incoming {
            background: var(--message-incoming);
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }
        
        .message-author {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            cursor: pointer;
        }
        
        .message-author-name {
            font-size: 12px;
            color: var(--accent-color);
            font-weight: 500;
        }
        
        .message-text {
            font-size: 14px;
            word-wrap: break-word;
        }
        
        .message-time {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 5px;
            text-align: right;
        }
        
        .input-area {
            padding: 16px 20px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 14px;
        }
        
        .message-input {
            flex: 1;
            padding: 12px 18px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-primary);
            border-radius: 32px;
            outline: none;
        }
        
        .send-btn {
            background: var(--accent-color);
            border: none;
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.96);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        
        .modal-content {
            background: var(--modal-bg);
            padding: 32px;
            border-radius: 32px;
            width: 460px;
            max-width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }
        
        .modal-content h2 {
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .modal-content input, .modal-content textarea, .modal-content select {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-primary);
            border-radius: 18px;
            font-size: 14px;
        }
        
        .modal-content button {
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            background: var(--accent-color);
            border: none;
            color: white;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
        }
        
        .setting-item {
            margin-bottom: 20px;
        }
        
        .setting-item label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        .color-preview {
            width: 40px;
            height: 40px;
            border-radius: 20px;
            margin-top: 8px;
            border: 2px solid var(--border-color);
        }
        
        .support-email {
            background: var(--input-bg);
            padding: 12px;
            border-radius: 16px;
            text-align: center;
            margin-top: 20px;
        }
        
        .support-email a {
            color: var(--accent-color);
            text-decoration: none;
        }
        
        .incoming-call {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--bg-secondary);
            padding: 16px 24px;
            border-radius: 20px;
            display: flex;
            gap: 16px;
            z-index: 1500;
            border: 1px solid var(--accent-color);
            animation: slideIn 0.3s ease;
        }
        
        .call-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 30px;
            z-index: 3000;
        }
        
        .typing-indicator {
            font-size: 12px;
            color: var(--text-secondary);
            padding: 8px 20px;
            font-style: italic;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .no-items {
            text-align: center;
            color: var(--text-muted);
            padding: 40px 20px;
            font-size: 14px;
        }
        
        .my-id-display {
            background: var(--input-bg);
            padding: 12px;
            border-radius: 16px;
            margin: 15px 0;
            word-break: break-all;
            font-size: 12px;
            font-family: monospace;
            text-align: center;
        }
        
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent-color);
            border-radius: 10px;
        }
    </style>
</head>
<body>
<div class="app" id="app">
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="logo"><span>Ww</span></div>
            <button class="settings-btn" id="settingsBtn">⚙️</button>
        </div>
        
        <div class="tabs">
            <div class="tab active" data-tab="chats">💬 Чаты</div>
            <div class="tab" data-tab="channels">📢 Каналы</div>
        </div>
        
        <div class="search-container" id="searchContainer">
            <input type="text" class="search-input" id="searchInput" placeholder="🔍 Поиск по Peer ID или имени...">
            <div class="search-results" id="searchResults"></div>
        </div>
        
        <div class="user-profile" id="userProfileBtn">
            <div class="avatar" id="userAvatar" style="position:relative;">W</div>
            <div class="user-info">
                <div class="user-name" id="userName"></div>
                <div class="user-bio" id="userBio"></div>
                <div class="user-peer-id">
                    <span id="peerIdText"></span>
                    <button class="copy-id-btn" id="copyIdBtn">📋</button>
                </div>
            </div>
        </div>

        <div id="chatsPanel" style="display:flex; flex-direction:column; flex:1;">
            <div class="chats-list" id="chatsList">
                <div class="no-items">✨ Нет чатов<br>Найдите друга по Peer ID</div>
            </div>
        </div>
        
        <div id="channelsPanel" style="display:none; flex-direction:column; flex:1;">
            <button class="create-channel-btn" id="createChannelBtn">➕ Создать канал</button>
            <div class="channels-list" id="channelsList">
                <div class="no-items">📢 Нет каналов<br>Создайте свой первый канал!</div>
            </div>
        </div>
    </div>

    <div class="chat-area">
        <div class="chat-header">
            <div class="chat-contact">
                <div class="chat-avatar" id="chatAvatar">✨</div>
                <div>
                    <div class="chat-name" id="chatName">Ww Мессенджер</div>
                    <div class="peer-status" id="peerStatus">⚪ Выберите чат</div>
                </div>
            </div>
            <div class="call-buttons" id="callButtons">
                <button class="call-btn" id="audioCallBtn" title="Аудиозвонок">📞</button>
                <button class="call-btn" id="videoCallBtn" title="Видеозвонок">📹</button>
                <button class="subscribe-btn" id="subscribeChannelBtn" style="display:none;">📢 Подписаться</button>
            </div>
        </div>
        <div class="messages-area" id="messagesArea">
            <div style="text-align:center;color:var(--text-muted);margin-top:60px;">
                💬 <strong>Добро пожаловать в Ww!</strong><br><br>
                📝 Нажмите на имя пользователя в сообщении,<br>
                чтобы посмотреть его профиль!
            </div>
        </div>
        <div class="typing-indicator" id="typingIndicator" style="display:none;"></div>
        <div class="input-area" id="inputArea">
            <input type="text" class="message-input" id="messageInput" placeholder="Сообщение...">
            <button class="send-btn" id="sendBtn">➤</button>
        </div>
    </div>
</div>

<script>
    // ==================== ГЕНЕРАЦИЯ УНИКАЛЬНОГО ID ====================
    function generateUniquePeerId() {
        // Используем криптографически безопасный генератор + временную метку
        const array = new Uint8Array(16);
        crypto.getRandomValues(array);
        const randomPart = Array.from(array, byte => byte.toString(16).padStart(2, '0')).join('');
        const timestamp = Date.now().toString(36);
        const randomSuffix = Math.random().toString(36).substring(2, 10);
        return `ww_${timestamp}_${randomPart.substring(0, 16)}_${randomSuffix}`;
    }
    
    // Проверка уникальности ID в localStorage
    function isPeerIdUnique(peerId) {
        const existingIds = JSON.parse(localStorage.getItem('ww_all_peer_ids') || '[]');
        return !existingIds.includes(peerId);
    }
    
    function registerPeerId(peerId) {
        const existingIds = JSON.parse(localStorage.getItem('ww_all_peer_ids') || '[]');
        if (!existingIds.includes(peerId)) {
            existingIds.push(peerId);
            localStorage.setItem('ww_all_peer_ids', JSON.stringify(existingIds));
        }
        return true;
    }
    
    // ==================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ====================
    let peer = null;
    let currentUser = null;
    let currentChatId = null;
    let currentChannelId = null;
    let activeTab = 'chats';
    let activeConnections = new Map();
    let contacts = [];
    let channels = [];
    let subscribedChannels = new Set();
    let messages = new Map();
    let channelMessages = new Map();
    let localStream = null;
    let activeCall = null;
    
    // ==================== НАСТРОЙКИ ТЕМЫ ====================
    let settings = {
        theme: 'dark',
        messageColor: '#2b6e4c'
    };
    
    function loadSettings() {
        const savedSettings = localStorage.getItem('ww_settings');
        if (savedSettings) {
            settings = JSON.parse(savedSettings);
        }
        applyTheme();
    }
    
    function saveSettings() {
        localStorage.setItem('ww_settings', JSON.stringify(settings));
    }
    
    function applyTheme() {
        const root = document.documentElement;
        if (settings.theme === 'light') {
            root.style.setProperty('--bg-primary', '#f5f5f5');
            root.style.setProperty('--bg-secondary', '#ffffff');
            root.style.setProperty('--bg-tertiary', '#f0f0f0');
            root.style.setProperty('--bg-hover', '#e8e8e8');
            root.style.setProperty('--bg-active', '#e0f0e0');
            root.style.setProperty('--border-color', '#e0e0e0');
            root.style.setProperty('--text-primary', '#1a1a1a');
            root.style.setProperty('--text-secondary', '#666666');
            root.style.setProperty('--text-muted', '#999999');
            root.style.setProperty('--message-outgoing', settings.messageColor);
            root.style.setProperty('--message-incoming', '#e8e8e8');
            root.style.setProperty('--avatar-bg', '#e0e0e0');
            root.style.setProperty('--input-bg', '#ffffff');
            root.style.setProperty('--input-border', '#dddddd');
            root.style.setProperty('--modal-bg', '#ffffff');
        } else {
            root.style.setProperty('--bg-primary', '#000000');
            root.style.setProperty('--bg-secondary', '#0c0c0c');
            root.style.setProperty('--bg-tertiary', '#050505');
            root.style.setProperty('--bg-hover', '#141414');
            root.style.setProperty('--bg-active', '#1e2a1e');
            root.style.setProperty('--border-color', '#1f1f1f');
            root.style.setProperty('--text-primary', '#ffffff');
            root.style.setProperty('--text-secondary', '#888888');
            root.style.setProperty('--text-muted', '#666666');
            root.style.setProperty('--message-outgoing', settings.messageColor);
            root.style.setProperty('--message-incoming', '#202020');
            root.style.setProperty('--avatar-bg', '#202020');
            root.style.setProperty('--input-bg', '#1a1a1a');
            root.style.setProperty('--input-border', '#2c2c2c');
            root.style.setProperty('--modal-bg', '#131313');
        }
        
        if (currentChatId) renderMessages(currentChatId);
        if (currentChannelId) renderChannelMessages(currentChannelId);
    }
    
    function showSettingsModal() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h2>⚙️ Настройки</h2>
                
                <div class="setting-item">
                    <label>🎨 Тема оформления</label>
                    <select id="themeSelect">
                        <option value="dark" ${settings.theme === 'dark' ? 'selected' : ''}>🌙 Тёмная</option>
                        <option value="light" ${settings.theme === 'light' ? 'selected' : ''}>☀️ Светлая</option>
                    </select>
                </div>
                
                <div class="setting-item">
                    <label>🎨 Цвет моих сообщений</label>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <input type="color" id="messageColorInput" value="${settings.messageColor}">
                        <div class="color-preview" id="colorPreview" style="background: ${settings.messageColor};"></div>
                    </div>
                </div>
                
                <div class="setting-item">
                    <label>🔊 Звуки</label>
                    <button id="testSoundBtn" style="background: var(--avatar-bg); margin:0; padding:8px;">🔊 Тест звука</button>
                </div>
                
                <div class="support-email">
                    <span>📧 Поддержка: </span>
                    <a href="mailto:mirasovajnaz@gmail.com">mirasovajnaz@gmail.com</a>
                    <div style="font-size: 11px; margin-top: 8px; color: var(--text-muted);">
                        По вопросам работы мессенджера, предложениям и проблемам
                    </div>
                </div>
                
                <button id="saveSettingsBtn">💾 Сохранить настройки</button>
                <button id="closeSettingsBtn" style="background: #3a3a3a;">Закрыть</button>
            </div>
        `;
        document.body.appendChild(modal);
        
        const themeSelect = modal.querySelector('#themeSelect');
        const messageColorInput = modal.querySelector('#messageColorInput');
        const colorPreview = modal.querySelector('#colorPreview');
        
        messageColorInput.addEventListener('input', (e) => {
            colorPreview.style.background = e.target.value;
        });

    // ==================== ЗВУКИ ====================
    function playBeep(frequency, duration, volume = 0.15) {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.frequency.value = frequency;
            gainNode.gain.value = volume;
            oscillator.start();
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            oscillator.stop(audioCtx.currentTime + duration);
        } catch(e) {}
    }
    
    // ==================== РАБОТА С ХРАНИЛИЩЕМ ====================
    function loadData() {
        const savedUser = localStorage.getItem('ww_user_p2p_v5');
        const savedContacts = localStorage.getItem('ww_contacts_p2p_v5');
        const savedMessages = localStorage.getItem('ww_messages_p2p_v5');
        const savedChannels = localStorage.getItem('ww_channels_v5');
        const savedSubscriptions = localStorage.getItem('ww_subscriptions_v5');
        const savedChannelMessages = localStorage.getItem('ww_channel_messages_v5');
        
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
        } else {
            let newId;
            do {
                newId = generateUniquePeerId();
            } while (!isPeerIdUnique(newId));
            registerPeerId(newId);
            
            currentUser = {
                id: newId,
                name: 'User_' + Math.floor(Math.random() * 10000),
                avatar: null,
                bio: 'Привет! Я в Ww!',
                createdAt: Date.now()
            };
        }
        
        if (savedContacts) contacts = JSON.parse(savedContacts);
        else contacts = [];
        
        if (savedMessages) messages = new Map(JSON.parse(savedMessages));
        else messages = new Map();
        
        if (savedChannels) channels = JSON.parse(savedChannels);
        else channels = [];
        
        if (savedSubscriptions) subscribedChannels = new Set(JSON.parse(savedSubscriptions));
        else subscribedChannels = new Set();
        
        if (savedChannelMessages) channelMessages = new Map(JSON.parse(savedChannelMessages));
        else channelMessages = new Map();
    }
    
    function saveData() {
        localStorage.setItem('ww_user_p2p_v5', JSON.stringify(currentUser));
        localStorage.setItem('ww_contacts_p2p_v5', JSON.stringify(contacts));
        localStorage.setItem('ww_messages_p2p_v5', JSON.stringify([...messages]));
        localStorage.setItem('ww_channels_v5', JSON.stringify(channels));
        localStorage.setItem('ww_subscriptions_v5', JSON.stringify([...subscribedChannels]));
        localStorage.setItem('ww_channel_messages_v5', JSON.stringify([...channelMessages]));
    }
    
    // ==================== PEER.JS ИНИЦИАЛИЗАЦИЯ ====================
    function initPeer() {
        peer = new Peer(currentUser.id, {
            config: { 
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            }
        });
        
        peer.on('open', (id) => {
            document.getElementById('connectionStatus').className = 'connection-status online';
            document.getElementById('connectionStatus').innerHTML = '🟢 Онлайн';
            const shortId = id.length > 20 ? id.slice(0, 20) + '...' : id;
            document.getElementById('peerIdText').innerText = shortId;
            updateUserProfileUI();
        });
        
        peer.on('connection', (conn) => {
            setupDataConnection(conn);
        });
        
        peer.on('call', (call) => {
            showIncomingCall(call);
        });
        
        peer.on('error', (err) => {
            console.error('Peer error:', err);
            document.getElementById('connectionStatus').innerHTML = '⚠️ Ошибка';
        });
        
        peer.on('disconnected', () => {
            document.getElementById('connectionStatus').innerHTML = '⚡ Переподключение...';
            setTimeout(() => peer.reconnect(), 3000);
        });
    }
    
    function setupDataConnection(conn) {
        conn.on('open', () => {
            activeConnections.set(conn.peer, conn);
            
            let contact = contacts.find(c => c.peerId === conn.peer);
            if (!contact) {
                contact = {
                    peerId: conn.peer,
                    name: 'User_' + conn.peer.slice(-8),
                    avatar: null,
                    bio: '',
                    addedAt: Date.now()
                };
                contacts.push(contact);
                saveData();
            }
            
            renderChatsList();
            
            conn.send({
                type: 'info',
                name: currentUser.name,
                avatar: currentUser.avatar,
                bio: currentUser.bio,
                peerId: currentUser.id
            });
            
            if (currentChatId === conn.peer) {
                document.getElementById('peerStatus').innerHTML = '🟢 В сети';
                document.getElementById('peerStatus').className = 'peer-status connected';
            }
        });
        
        conn.on('data', (data) => {
            handleIncomingData(conn.peer, data);
        });
        
        conn.on('close', () => {
            activeConnections.delete(conn.peer);
            if (currentChatId === conn.peer) {
                document.getElementById('peerStatus').innerHTML = '⚪ Не в сети';
                document.getElementById('peerStatus').className = 'peer-status';
            }
            renderChatsList();
        });
    }
    
    function handleIncomingData(peerId, data) {
        switch(data.type) {
            case 'info':
                updateContactInfo(peerId, data);
                break;
            case 'message':
                receiveMessage(peerId, data);
                break;
            case 'typing':
                showTypingIndicator(peerId);
                break;
            case 'channel_post':
                receiveChannelPost(data);
                break;
        }
    }
    
    function updateContactInfo(peerId, info) {
        const contact = contacts.find(c => c.peerId === peerId);
        if (contact) {
            contact.name = info.name;
            contact.avatar = info.avatar;
            contact.bio = info.bio;
            saveData();
            renderChatsList();
            if (currentChatId === peerId) {
                document.getElementById('chatName').innerText = contact.name;
                document.getElementById('chatAvatar').innerHTML = contact.avatar ? `<img src="${contact.avatar}">` : contact.name.charAt(0).toUpperCase();
            }
        }
    }

    function openChannel(channelId) {
        currentChannelId = channelId;
        currentChatId = null;
        const channel = channels.find(c => c.id === channelId);
        if (!channel) return;
        
        document.getElementById('chatName').innerText = '📢 ' + channel.name;
        document.getElementById('chatAvatar').innerHTML = channel.avatar ? `<img src="${channel.avatar}">` : '📢';
        document.getElementById('peerStatus').innerHTML = `👥 ${channel.subscribers?.length || 0} подписчиков`;
        document.getElementById('peerStatus').className = 'peer-status';
        
        const isSubscribed = subscribedChannels.has(channelId);
        const subscribeBtn = document.getElementById('subscribeChannelBtn');
        subscribeBtn.style.display = 'block';
        subscribeBtn.innerText = isSubscribed ? '❌ Отписаться' : '📢 Подписаться';
        subscribeBtn.className = isSubscribed ? 'subscribe-btn subscribed' : 'subscribe-btn';
        
        document.getElementById('callButtons').style.display = 'none';
        document.getElementById('inputArea').style.display = 'flex';
        
        renderChannelMessages(channelId);
        renderChannelsList();
    }
    
    function subscribeToChannel(channelId) {
        const channel = channels.find(c => c.id === channelId);
        if (!channel) return;
        
        if (subscribedChannels.has(channelId)) {
            subscribedChannels.delete(channelId);
            if (channel.subscribers) {
                channel.subscribers = channel.subscribers.filter(id => id !== currentUser.id);
            }
            playBeep(440, 0.2);
        } else {
            subscribedChannels.add(channelId);
            if (!channel.subscribers) channel.subscribers = [];
            if (!channel.subscribers.includes(currentUser.id)) {
                channel.subscribers.push(currentUser.id);
            }
            playBeep(660, 0.2);
        }
        
        saveData();
        
        if (currentChannelId === channelId) {
            const isSubscribed = subscribedChannels.has(channelId);
            const subscribeBtn = document.getElementById('subscribeChannelBtn');
            subscribeBtn.innerText = isSubscribed ? '❌ Отписаться' : '📢 Подписаться';
            subscribeBtn.className = isSubscribed ? 'subscribe-btn subscribed' : 'subscribe-btn';
            document.getElementById('peerStatus').innerHTML = `👥 ${channel.subscribers?.length || 0} подписчиков`;
        }
        
        renderChannelsList();
    }
    
    function sendToChannel() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text || !currentChannelId) return;
        
        const channel = channels.find(c => c.id === currentChannelId);
        if (!channel) return;
        
        const post = {
            type: 'channel_post',
            channelId: currentChannelId,
            text: text,
            authorId: currentUser.id,
            authorName: currentUser.name,
            authorAvatar: currentUser.avatar,
            timestamp: Date.now(),
            time: new Date().toLocaleTimeString().slice(0,5)
        };
        
        const channelMsgs = channelMessages.get(currentChannelId) || [];
        channelMsgs.push(post);
        channelMessages.set(currentChannelId, channelMsgs);
        saveData();
        
        renderChannelMessages(currentChannelId);
        input.value = '';
        playBeep(880, 0.1);
    }
    
    function receiveChannelPost(data) {
        const channelMsgs = channelMessages.get(data.channelId) || [];
        channelMsgs.push(data);
        channelMessages.set(data.channelId, channelMsgs);
        saveData();
        
        if (currentChannelId === data.channelId) {
            renderChannelMessages(data.channelId);
        }
        playBeep(660, 0.15);
    }
    
    function renderChannelMessages(channelId) {
        const container = document.getElementById('messagesArea');
        const msgs = channelMessages.get(channelId) || [];
        if (msgs.length === 0) {
            container.innerHTML = '<div style="text-align:center;color:var(--text-muted);margin-top:60px;">📢 Нет постов<br>Напишите первое сообщение в канал!</div>';
            return;
        }
        container.innerHTML = '';
        msgs.forEach(msg => {
            const isOutgoing = msg.authorId === currentUser.id;
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isOutgoing ? 'outgoing' : 'incoming'}`;
            msgDiv.innerHTML = `
                <div class="message-author" data-user-id="${msg.authorId}" data-user-name="${escapeHtml(msg.authorName)}" data-user-avatar="${msg.authorAvatar || ''}">
                    <div class="avatar" style="width:24px;height:24px;font-size:12px;">${msg.authorAvatar ? `<img src="${msg.authorAvatar}">` : (msg.authorName?.charAt(0) || '👤')}</div>
                    <div class="message-author-name">${escapeHtml(msg.authorName)}</div>
                </div>
                <div class="message-text">${escapeHtml(msg.text)}</div>
                <div class="message-time">${msg.time}</div>
            `;
            const authorDiv = msgDiv.querySelector('.message-author');
            authorDiv.onclick = (e) => {
                e.stopPropagation();
                showUserProfile(
                    authorDiv.dataset.userId,
                    authorDiv.dataset.userName,
                    authorDiv.dataset.userAvatar,
                    ''
                );
            };
            container.appendChild(msgDiv);
        });
        container.scrollTop = container.scrollHeight;
    }
    
    function renderChannelsList() {
        const container = document.getElementById('channelsList');
        if (channels.length === 0) {

    // ==================== ЛИЧНЫЕ СООБЩЕНИЯ ====================
    function searchUsers(query) {
        if (!query.trim()) return [];
        query = query.toLowerCase();
        // Поиск по имени, peerId, или ID
        return contacts.filter(c => 
            c.name.toLowerCase().includes(query) || 
            c.peerId.toLowerCase().includes(query)
        );
    }
    
    function renderSearchResults(query) {
        const results = searchUsers(query);
        const container = document.getElementById('searchResults');
        if (!query.trim() || results.length === 0) {
            container.innerHTML = '';
            return;

                </div>

    function connectToPeer(peerId) {
        if (peerId === currentUser.id) {
            alert("❌ Нельзя добавить самого себя");
            return;
        }
        
        if (activeConnections.has(peerId)) {
            openChat(peerId);
        } else {
            const conn = peer.connect(peerId);
            setupDataConnection(conn);
            openChat(peerId);
        }
        
        document.getElementById('searchInput').value = '';
        document.getElementById('searchResults').innerHTML = '';
        switchTab('chats');
    }
    
    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text || !currentChatId) return;
        
        const connection = activeConnections.get(currentChatId);
        if (!connection) {
            alert("⚠️ Пользователь не в сети");
            return;
        }
        
        const message = {
            type: 'message',
            text: text,
            timestamp: Date.now(),
            sender: currentUser.id,
            senderName: currentUser.name,
            senderAvatar: currentUser.avatar
        };
        
        connection.send(message);
        
        const chatMessages = messages.get(currentChatId) || [];
        chatMessages.push({
            ...message,
            outgoing: true,
            time: new Date().toLocaleTimeString().slice(0,5)
        });
        messages.set(currentChatId, chatMessages);
        saveData();
        
        renderMessages(currentChatId);
        input.value = '';
        playBeep(880, 0.1);
        renderChatsList();
    }
    
    function receiveMessage(peerId, data) {
        const contact = contacts.find(c => c.peerId === peerId);
        const senderName = data.senderName || contact?.name || 'Пользователь';
        const senderAvatar = data.senderAvatar || contact?.avatar;
        
        const chatMessages = messages.get(peerId) || [];
        chatMessages.push({
            text: data.text,
            timestamp: data.timestamp,
            outgoing: false,
            senderId: data.sender,
            senderName: senderName,
            senderAvatar: senderAvatar,
            time: new Date(data.timestamp).toLocaleTimeString().slice(0,5)
        });
        messages.set(peerId, chatMessages);
        saveData();
        
        if (currentChatId === peerId) {
            renderMessages(peerId);
        }
        renderChatsList();
        playBeep(660, 0.15);
    }
    
    function sendTyping() {
        if (!currentChatId) return;
        const connection = activeConnections.get(currentChatId);
        if (connection) {
            connection.send({ type: 'typing' });
        }
    }
    
    function showTypingIndicator(peerId) {
        if (currentChatId === peerId) {
            const contact = contacts.find(c => c.peerId === peerId);
            document.getElementById('typingIndicator').style.display = 'block';
            document.getElementById('typingIndicator').innerHTML = `${contact?.name || 'Пользователь'} печатает...`;
            setTimeout(() => {
                document.getElementById('typingIndicator').style.display = 'none';
            }, 2000);
        }
    }
    
    function renderMessages(chatId) {
        const container = document.getElementById('messagesArea');
        const chatMessages = messages.get(chatId) || [];
        if (chatMessages.length === 0) {
            container.innerHTML = '<div style="text-align:center;color:var(--text-muted);margin-top:60px;">💬 Напишите первое сообщение!</div>';
            return;
        }
        container.innerHTML = '';
        chatMessages.forEach(msg => {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${msg.outgoing ? 'outgoing' : 'incoming'}`;
            
            if (!msg.outgoing && msg.senderName) {
                msgDiv.innerHTML = `
                    <div class="message-author" data-user-id="${msg.senderId}" data-user-name="${escapeHtml(msg.senderName)}" data-user-avatar="${msg.senderAvatar || ''}">
                        <div class="avatar" style="width:24px;height:24px;font-size:12px;">${msg.senderAvatar ? `<img src="${msg.senderAvatar}">` : (msg.senderName?.charAt(0) || '👤')}</div>
                        <div class="message-author-name">${escapeHtml(msg.senderName)}</div>
                    </div>
                    <div class="message-text">${escapeHtml(msg.text)}</div>
                    <div class="message-time">${msg.time}</div>
                `;
                const authorDiv = msgDiv.querySelector('.message-author');
                authorDiv.onclick = (e) => {
                    e.stopPropagation();
                    const contact = contacts.find(c => c.peerId === msg.senderId);
                    showUserProfile(
                        msg.senderId,
                        msg.senderName,
                        msg.senderAvatar,
                        contact?.bio || ''
                    );
                };
            } else {
                msgDiv.innerHTML = `
                    <div class="message-text">${escapeHtml(msg.text)}</div>
                    <div class="message-time">${msg.time}</div>
                `;
            }
            container.appendChild(msgDiv);
        });
        container.scrollTop = container.scrollHeight;
    }
    
    function openChat(peerId) {
        currentChatId = peerId;
        currentChannelId = null;
        renderMessages(peerId);
        renderChatsList();
        
        const contact = contacts.find(c => c.peerId === peerId);
        if (contact) {
            document.getElementById('chatName').innerText = contact.name;
            document.getElementById('chatAvatar').innerHTML = contact.avatar ? `<img src="${contact.avatar}">` : contact.name.charAt(0).toUpperCase();
        }
        
        document.getElementById('subscribeChannelBtn').style.display = 'none';
        document.getElementById('callButtons').style.display = 'flex';
        document.getElementById('inputArea').style.display = 'flex';
        
        const isConnected = activeConnections.has(peerId);
        document.getElementById('peerStatus').innerHTML = isConnected ? '🟢 В сети' : '⚪ Не в сети';
        document.getElementById('peerStatus').className = isConnected ? 'peer-status connected' : 'peer-status';
    }
    
    function renderChatsList() {
        const container = document.getElementById('chatsList');
        const chatIds = new Set([...messages.keys(), ...contacts.map(c => c.peerId)]);
        
        if (chatIds.size === 0) {
            container.innerHTML = '<div class="no-items">✨ Нет чатов<br>Найдите друга по Peer ID</div>';
            return;
        }
        
        container.innerHTML = '';
        Array.from(chatIds).forEach(peerId => {
            const contact = contacts.find(c => c.peerId === peerId);
            if (!contact) return;
            
            const chatMessages = messages.get(peerId) || [];
            const lastMsg = chatMessages[chatMessages.length - 1];
            const isConnected = activeConnections.has(peerId);
            
            const div = document.createElement('div');
            div.className = `chat-item ${currentChatId === peerId ? 'active' : ''}`;
            div.innerHTML = `
                <div class="chat-avatar" style="position:relative;">
                    ${contact.avatar ? `<img src="${contact.avatar}">` : `<span>${contact.name.charAt(0).toUpperCase()}</span>`}
                    ${isConnected ? '<div class="online-dot"></div>' : ''}
                </div>
                <div class="chat-details">
                    <div class="chat-name">${escapeHtml(contact.name)}</div>
                    <div class="chat-last-msg">${lastMsg ? escapeHtml(lastMsg.text.substring(0, 30)) : '✨ Новый чат'}</div>
                </div>
            `;
            div.onclick = () => openChat(peerId);
            container.appendChild(div);
        });
    }
    
    // ==================== ЗВОНКИ ====================
    async function startCall(isVideo) {
        if (!currentChatId) { alert("Выберите чат"); return; }
        
        const connection = activeConnections.get(currentChatId);
        if (!connection) {
            alert("Пользователь не в сети");
            return;
        }
        
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: isVideo });
            const call = peer.call(currentChatId, localStream);
            activeCall = call;
            
            call.on('stream', (remoteStream) => {
                showCallWindow(remoteStream, isVideo);
            });
            
            call.on('close', () => endCall());
            playBeep(440, 0.5);
        } catch(err) {
            alert("❌ Не удалось получить доступ к камере/микрофону");
        }
    }
    
    function showIncomingCall(call) {
        const callerId = call.peer;
        const contact = contacts.find(c => c.peerId === callerId);
        
        const callDiv = document.createElement('div');
        callDiv.className = 'incoming-call';
        callDiv.innerHTML = `
            <div>📞 Входящий звонок от <strong>${contact?.name || callerId.slice(0, 10)}</strong></div>
            <button id="acceptCallBtn" style="background:var(--accent-color); border:none; color:white; padding:8px 20px; border-radius:20px;">Принять</button>
            <button id="rejectCallBtn" style="background:#c42e2e; border:none; color:white; padding:8px 20px; border-radius:20px;">Отклонить</button>
        `;
        document.body.appendChild(callDiv);
        
        document.getElementById('acceptCallBtn').onclick = async () => {
            callDiv.remove();
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
                call.answer(localStream);
                activeCall = call;
                call.on('stream', (remoteStream) => showCallWindow(remoteStream, true));
                playBeep(600, 0.3);
            } catch(err) {
                alert("Ошибка доступа к медиа");
            }
        };
        
        document.getElementById('rejectCallBtn').onclick = () => {
            callDiv.remove();
            call.close();
            playBeep(300, 0.5);
        };
        
        playBeep(440, 1);
        setTimeout(() => { if (callDiv.parentNode) callDiv.remove(); }, 30000);
    }
    
    function showCallWindow(stream, isVideo) {
        const existingCall = document.querySelector('.call-modal');
        if (existingCall) existingCall.remove();
        
        const callWindow = document.createElement('div');
        callWindow.className = 'call-modal';
        callWindow.innerHTML = `
            <div style="text-align:center;">
                <video id="remoteVideo" autoplay playsinline style="width:100%; max-width:500px; border-radius:24px; background:#000;"></video>
                ${isVideo ? `<video id="localVideo" autoplay playsinline muted style="position:absolute; bottom:30px; right:30px; width:120px; border-radius:16px; border:2px solid var(--accent-color);"></video>` : ''}
            </div>
            <button id="endCallBtn" style="background:#c42e2e; padding:12px 40px; border:none; border-radius:40px; color:white; font-size:18px; cursor:pointer;">🔴 Завершить</button>
        `;
        document.body.appendChild(callWindow);
        
        const remoteVideo = callWindow.querySelector('#remoteVideo');
        remoteVideo.srcObject = stream;
        
        if (isVideo && localStream) {
            const localVideo = callWindow.querySelector('#localVideo');
            localVideo.srcObject = localStream;
        }
        
        callWindow.querySelector('#endCallBtn').onclick = () => {
            endCall();
            callWindow.remove();
        };
    }
    
    function endCall() {
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
        }
        if (activeCall) {
            activeCall.close();
            activeCall = null;
        }
        playBeep(300, 0.5);
    }
    
    // ==================== РЕДАКТИРОВАНИЕ ПРОФИЛЯ ====================
    function showEditProfileModal() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h2>✏️ Редактировать профиль</h2>
                <input type="text" id="editName" placeholder="Имя" value="${escapeHtml(currentUser.name)}">
                <textarea id="editBio" placeholder="Описание профиля" rows="3">${escapeHtml(currentUser.bio || '')}</textarea>
                
                <div class="my-id-display">
                    <strong>🆔 Ваш Peer ID:</strong><br>
                    <span style="font-family: monospace; font-size: 11px;">${currentUser.id}</span>
                    <button id="copyFullIdBtn" style="margin-top:8px; padding:6px 12px; font-size:12px;">📋 Копировать ID</button>
                </div>
                
                <div style="text-align:center; margin:15px 0;">
                    <div class="avatar" style="width:100px;height:100px;margin:0 auto;">
                        ${currentUser.avatar ? `<img src="${currentUser.avatar}" style="width:100%;height:100%;object-fit:cover;">` : `<span style="font-size:48px;">${currentUser.name.charAt(0).toUpperCase()}</span>`}
                    </div>
                    <label style="background:var(--accent-color);padding:8px 16px;border-radius:20px;display:inline-block;margin-top:10px;cursor:pointer;font-size:12px;">
                        📸 Загрузить фото
                        <input type="file" id="avatarUpload" accept="image/*" style="display:none;">
                    </label>
                    <button id="drawAvatarBtn" style="background:#3a3a3a; margin-top:10px;">🎨 Нарисовать</button>
                </div>
                <button id="saveProfileBtn">Сохранить</button>
                <button id="cancelProfileBtn" style="background:#3a3a3a;">Отмена</button>
            </div>
        `;
        document.body.appendChild(modal);
        
        const fileInput = modal.querySelector('#avatarUpload');
        const avatarDiv = modal.querySelector('.avatar');
        
        modal.querySelector('#copyFullIdBtn').onclick = () => {
            navigator.clipboard.writeText(currentUser.id);
            const btn = modal.querySelector('#copyFullIdBtn');
            btn.textContent = '✅ Скопировано!';
            setTimeout(() => btn.textContent = '📋 Копировать ID', 2000);
            playBeep(880, 0.1);
        };
        
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    avatarDiv.innerHTML = `<img src="${event.target.result}" style="width:100%;height:100%;object-fit:cover;">`;
                    currentUser.avatar = event.target.result;
                    updateUserProfileUI();
                    activeConnections.forEach((conn) => {
                        conn.send({ type: 'info', name: currentUser.name, avatar: currentUser.avatar, bio: currentUser.bio, peerId: currentUser.id });
                    });
                };
                reader.readAsDataURL(file);
            }
        };
        
        modal.querySelector('#drawAvatarBtn').onclick = () => {
            modal.remove();
            showDrawingModal();
        };
        
        modal.querySelector('#saveProfileBtn').onclick = () => {
            const newName = modal.querySelector('#editName').value.trim();
            const newBio = modal.querySelector('#editBio').value.trim();
            if (newName) currentUser.name = newName;
            currentUser.bio = newBio || '';
            saveData();
            updateUserProfileUI();
            activeConnections.forEach((conn) => {
                conn.send({ type: 'info', name: currentUser.name, avatar: currentUser.avatar, bio: currentUser.bio, peerId: currentUser.id });
            });
            renderChatsList();
            modal.remove();
        };
        
        modal.querySelector('#cancelProfileBtn').onclick = () => modal.remove();
    }
    
    function showDrawingModal() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h2>🎨 Нарисовать аватар</h2>
                <canvas id="drawCanvas" width="200" height="200" style="background:white; border-radius:50%; cursor:crosshair; margin:0 auto; display:block;"></canvas>
                <div style="display:flex; gap:10px; margin-top:16px;">
                    <button id="saveDrawBtn">Сохранить</button>
                    <button id="clearDrawBtn">Очистить</button>
                    <button id="cancelDrawBtn">Отмена</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        const canvas = modal.querySelector('#drawCanvas');
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, 200, 200);
        ctx.fillStyle = '#000';
        ctx.font = 'bold 100px sans-serif';
        ctx.fillText('W', 65, 140);
        
        let drawing = false;
        canvas.addEventListener('mousedown', () => drawing = true);
        canvas.addEventListener('mouseup', () => drawing = false);
        canvas.addEventListener('mousemove', (e) => {
            if (!drawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * 200 / rect.width;
            const y = (e.clientY - rect.top) * 200 / rect.height;
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(x, y, 5, 0, Math.PI*2);
            ctx.fill();
        });
        
        modal.querySelector('#clearDrawBtn').onclick = () => {
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, 200, 200);
        };
        modal.querySelector('#saveDrawBtn').onclick = () => {
            currentUser.avatar = canvas.toDataURL();
            saveData();
            updateUserProfileUI();
            activeConnections.forEach((conn) => {
                conn.send({ type: 'info', name: currentUser.name, avatar: currentUser.avatar, bio: currentUser.bio, peerId: currentUser.id });
            });
            modal.remove();
        };
        modal.querySelector('#cancelDrawBtn').onclick = () => modal.remove();
    }
    
    function updateUserProfileUI() {
        document.getElementById('userName').innerText = currentUser.name;
        document.getElementById('userBio').innerText = currentUser.bio || 'Нет описания';
        const avatarDiv = document.getElementById('userAvatar');
        if (currentUser.avatar) {
            avatarDiv.innerHTML = `<img src="${currentUser.avatar}">`;
        } else {
            avatarDiv.innerHTML = currentUser.name.charAt(0).toUpperCase();
        }
    }
    
    function copyPeerId() {
        navigator.clipboard.writeText(currentUser.id).then(() => {
            const btn = document.getElementById('copyIdBtn');
            btn.textContent = '✅';
            setTimeout(() => btn.textContent = '📋', 2000);
            playBeep(880, 0.1);
        });
    }
    
    function switchTab(tab) {
        activeTab = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
        
        if (tab === 'chats') {
            document.getElementById('chatsPanel').style.display = 'flex';
            document.getElementById('channelsPanel').style.display = 'none';
            document.getElementById('searchInput').placeholder = "🔍 Поиск по Peer ID или имени...";
            renderChatsList();
            if (currentChatId) openChat(currentChatId);
        } else {
            document.getElementById('chatsPanel').style.display = 'none';
            document.getElementById('channelsPanel').style.display = 'flex';
            document.getElementById('searchInput').placeholder = "🔍 Поиск каналов по названию...";
            renderChannelsList();
            if (currentChannelId) openChannel(currentChannelId);
        }
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // ==================== ПОИСК КАНАЛОВ ====================
    function setupChannelSearch() {
        const searchInput = document.getElementById('searchInput');
        const resultsContainer = document.getElementById('searchResults');
        
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.trim().toLowerCase();
            
            if (activeTab === 'chats') {
                renderSearchResults(query);
            } else {
                // Поиск каналов
                if (!query) {
                    resultsContainer.innerHTML = '';
                    return;
                }
                
                const filteredChannels = channels.filter(channel => 
                    channel.name.toLowerCase().includes(query) || 
                    (channel.description && channel.description.toLowerCase().includes(query))
                );
                
                if (filteredChannels.length === 0) {
                    resultsContainer.innerHTML = '<div class="search-result-item" style="color:var(--text-muted);">❌ Каналы не найдены</div>';
                    return;
                }
                
                resultsContainer.innerHTML = filteredChannels.map(channel => `
                    <div class="search-result-item" data-channel-id="${channel.id}">
                        <div class="avatar" style="width:40px;height:40px;">
                            ${channel.avatar ? `<img src="${channel.avatar}">` : '📢'}
                        </div>
                        <div>
                            <div>📢 ${escapeHtml(channel.name)}</div>
                            <div style="font-size:11px;color:var(--text-muted);">👥 ${channel.subscribers?.length || 1} подписчиков</div>
                            ${channel.description ? `<div style="font-size:10px;">${escapeHtml(channel.description.substring(0, 30))}</div>` : ''}
                        </div>
                    </div>
                `).join('');
                
                document.querySelectorAll('[data-channel-id]').forEach(el => {
                    el.onclick = () => {
                        const channelId = el.dataset.channelId;
                        openChannel(channelId);
                        searchInput.value = '';
                        resultsContainer.innerHTML = '';
                        switchTab('channels');
                    };
                });
            }
        });
    }
    
    // ==================== ИНИЦИАЛИЗАЦИЯ ====================
    function bindEvents() {
        document.getElementById('sendBtn').onclick = () => {
            if (currentChatId) sendMessage();
            else if (currentChannelId) sendToChannel();
        };
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (currentChatId) sendMessage();
                else if (currentChannelId) sendToChannel();
            } else if (currentChatId) {
                sendTyping();
            }
        });
        document.getElementById('audioCallBtn').onclick = () => startCall(false);
        document.getElementById('videoCallBtn').onclick = () => startCall(true);
        document.getElementById('userProfileBtn').onclick = showEditProfileModal;
        document.getElementById('copyIdBtn').onclick = copyPeerId;
        document.getElementById('createChannelBtn').onclick = createChannel;
        document.getElementById('settingsBtn').onclick = showSettingsModal;
        document.getElementById('subscribeChannelBtn').onclick = () => {
            if (currentChannelId) subscribeToChannel(currentChannelId);
        };
        
        document.querySelectorAll('.tab').forEach(tab => {
            tab.onclick = () => switchTab(tab.dataset.tab);
        });
    }
    
    loadData();
    loadSettings();
    initPeer();
    bindEvents();
    setupChannelSearch();
    updateUserProfileUI();
    renderChatsList();
    renderChannelsList();
</script>
</body>
</html>
