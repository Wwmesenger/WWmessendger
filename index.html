<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ww - Мессенджер (автономный)</title>
    <style>
        :root {
            --bg-primary: #000000;
            --bg-secondary: #0c0c0c;
            --bg-tertiary: #050505;
            --bg-hover: #141414;
            --bg-active: #1e2a1e;
            --border-color: #1f1f1f;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --text-muted: #666666;
            --message-outgoing: #2b6e4c;
            --message-incoming: #202020;
            --accent-color: #4caf50;
            --avatar-bg: #202020;
            --input-bg: #1a1a1a;
            --input-border: #2c2c2c;
            --modal-bg: #131313;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }
        
        .app {
            display: flex;
            height: 100vh;
            width: 100%;
        }
        
        .sidebar {
            width: 320px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }
        
        .sidebar-header {
            padding: 16px 20px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo span {
            background: var(--text-primary);
            color: var(--bg-primary);
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 26px;
            font-weight: 900;
        }
        
        .connection-status {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            background: var(--accent-color);
        }
        
        .user-profile {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
        }
        
        .avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: var(--avatar-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: bold;
            overflow: hidden;
            position: relative;
            flex-shrink: 0;
        }
        
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .online-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent-color);
            position: absolute;
            bottom: 2px;
            right: 2px;
            border: 2px solid var(--bg-secondary);
        }
        
        .user-info {
            flex: 1;
            min-width: 0;
        }
        
        .user-name {
            font-weight: 700;
            font-size: 15px;
        }
        
        .user-bio {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .user-peer-id {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 2px;
            word-break: break-all;
        }
        
        .copy-id-btn {
            background: var(--avatar-bg);
            border: none;
            color: var(--text-primary);
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 10px;
            cursor: pointer;
            margin-left: 8px;
        }
        
        .search-container {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 8px;
        }
        
        .search-input {
            flex: 1;
            padding: 10px 16px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-primary);
            border-radius: 24px;
            outline: none;
            font-size: 14px;
        }
        
        .search-input:focus {
            border-color: var(--accent-color);
        }
        
        .search-btn {
            background: var(--accent-color);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
        }
        
        .chats-list {
            flex: 1;
            overflow-y: auto;
        }
        
        .chat-item {
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
        }
        
        .chat-item:hover {
            background: var(--bg-hover);
        }
        
        .chat-item.active {
            background: var(--bg-active);
            border-left: 3px solid var(--accent-color);
        }
        
        .chat-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--avatar-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            overflow: hidden;
            flex-shrink: 0;
            position: relative;
        }
        
        .chat-details {
            flex: 1;
            min-width: 0;
        }
        
        .chat-name {
            font-weight: 600;
            font-size: 15px;
        }
        
        .chat-last-msg {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
        }
        
        .chat-header {
            padding: 16px 24px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .chat-contact {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        
        .peer-status {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 16px;
            background: #2a2a2a;
            margin-top: 4px;
            text-align: center;
        }
        
        .peer-status.connected {
            background: var(--accent-color);
        }
        
        .call-buttons {
            display: flex;
            gap: 18px;
        }
        
        .call-btn {
            background: var(--avatar-bg);
            border: none;
            color: var(--text-primary);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 22px;
        }
        
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .message {
            max-width: 70%;
            padding: 10px 16px;
            border-radius: 22px;
            animation: fadeIn 0.2s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px);}
            to { opacity: 1; transform: translateY(0);}
        }
        
        .message.outgoing {
            background: var(--message-outgoing);
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }
        
        .message.incoming {
            background: var(--message-incoming);
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }
        
        .message-author {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            cursor: pointer;
        }
        
        .message-author-name {
            font-size: 12px;
            color: var(--accent-color);
            font-weight: 500;
        }
        
        .message-text {
            font-size: 14px;
            word-wrap: break-word;
        }
        
        .message-time {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 5px;
            text-align: right;
        }
        
        .input-area {
            padding: 16px 20px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 14px;
        }
        
        .message-input {
            flex: 1;
            padding: 12px 18px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-primary);
            border-radius: 32px;
            outline: none;
        }
        
        .send-btn {
            background: var(--accent-color);
            border: none;
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.96);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        
        .modal-content {
            background: var(--modal-bg);
            padding: 32px;
            border-radius: 32px;
            width: 460px;
            max-width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }
        
        .modal-content h2 {
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-primary);
            border-radius: 18px;
            font-size: 14px;
        }
        
        .modal-content button {
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            background: var(--accent-color);
            border: none;
            color: white;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
        }
        
        .avatar-upload {
            text-align: center;
            margin: 20px 0;
        }
        
        .avatar-preview {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #2a2a2a;
            margin: 0 auto 15px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .file-input-label {
            background: var(--accent-color);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            display: inline-block;
        }
        
        .my-id-display {
            background: var(--input-bg);
            padding: 12px;
            border-radius: 16px;
            margin: 15px 0;
            word-break: break-all;
            font-size: 12px;
            font-family: monospace;
            text-align: center;
        }
        
        .incoming-call {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--bg-secondary);
            padding: 16px 24px;
            border-radius: 20px;
            display: flex;
            gap: 16px;
            z-index: 1500;
            border: 1px solid var(--accent-color);
            animation: slideIn 0.3s ease;
        }
        
        .call-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 30px;
            z-index: 3000;
        }
        
        .typing-indicator {
            font-size: 12px;
            color: var(--text-secondary);
            padding: 8px 20px;
            font-style: italic;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .no-items {
            text-align: center;
            color: var(--text-muted);
            padding: 40px 20px;
            font-size: 14px;
        }
        
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent-color);
            border-radius: 10px;
        }
    </style>
</head>
<body>
<div class="app" id="app">
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="logo"><span>Ww</span></div>
            <div class="connection-status" id="connectionStatus">🟢 Готов</div>
        </div>
        
        <div class="search-container">
            <input type="text" class="search-input" id="searchInput" placeholder="🔍 Введите ID друга...">
            <button class="search-btn" id="searchBtn">🔍</button>
        </div>
        
        <div class="user-profile" id="userProfileBtn">
            <div class="avatar" id="userAvatar" style="position:relative;">W</div>
            <div class="user-info">
                <div class="user-name" id="userName"></div>
                <div class="user-bio" id="userBio"></div>
                <div class="user-peer-id">
                    <span id="peerIdText"></span>
                    <button class="copy-id-btn" id="copyIdBtn">📋</button>
                </div>
            </div>
        </div>

        <div class="chats-list" id="chatsList">
            <div class="no-items">✨ Нет чатов<br>Введите ID друга в поиск</div>
        </div>
    </div>

    <div class="chat-area">
        <div class="chat-header">
            <div class="chat-contact">
                <div class="chat-avatar" id="chatAvatar">✨</div>
                <div>
                    <div class="chat-name" id="chatName">Ww Мессенджер</div>
                    <div class="peer-status" id="peerStatus">⚪ Выберите чат</div>
                </div>
            </div>
            <div class="call-buttons">
                <button class="call-btn" id="audioCallBtn" title="Аудиозвонок">📞</button>
                <button class="call-btn" id="videoCallBtn" title="Видеозвонок">📹</button>
            </div>
        </div>
        <div class="messages-area" id="messagesArea">
            <div style="text-align:center;color:var(--text-muted);margin-top:60px;">
                💬 <strong>Добро пожаловать в Ww!</strong><br><br>
                📋 Скопируйте свой ID (под именем)<br>
                🔍 Вставьте ID друга в поле поиска<br>
                💬 Нажмите 🔍 - и общайтесь напрямую!
            </div>
        </div>
        <div class="typing-indicator" id="typingIndicator" style="display:none;"></div>
        <div class="input-area">
            <input type="text" class="message-input" id="messageInput" placeholder="Сообщение..." disabled>
            <button class="send-btn" id="sendBtn" disabled>➤</button>
        </div>
    </div>
</div>

<script>
    // ==================== ГЕНЕРАЦИЯ УНИКАЛЬНОГО ID ====================
    function generateUserId() {
        const array = new Uint8Array(16);
        crypto.getRandomValues(array);
        const randomPart = Array.from(array, byte => byte.toString(16).padStart(2, '0')).join('');
        const timestamp = Date.now().toString(36);
        return `ww_${timestamp}_${randomPart.substring(0, 16)}`;
    }
    
    // ==================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ====================
    let currentUser = null;
    let currentChatId = null;
    let contacts = [];
    let messages = new Map();
    let peerConnections = new Map(); // peerId -> RTCPeerConnection
    let dataChannels = new Map(); // peerId -> RTCDataChannel
    let localStream = null;
    let activeCall = null;
    let typingTimeout = null;
    let pendingIceCandidates = new Map(); // peerId -> candidates[]
    
    // Конфигурация STUN серверов
    const configuration = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun2.l.google.com:19302' },
            { urls: 'stun:stun3.l.google.com:19302' },
            { urls: 'stun:stun4.l.google.com:19302' }
        ]
    };
    
    // ==================== ЗАГРУЗКА ДАННЫХ ====================
    function loadData() {
        const savedUser = localStorage.getItem('ww_user_webrtc');
        const savedContacts = localStorage.getItem('ww_contacts_webrtc');
        const savedMessages = localStorage.getItem('ww_messages_webrtc');
        
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
        } else {
            currentUser = {
                id: generateUserId(),
                name: 'User_' + Math.floor(Math.random() * 10000),
                avatar: null,
                bio: 'Привет! Я в Ww!',
                createdAt: Date.now()
            };
        }
        
        if (savedContacts) contacts = JSON.parse(savedContacts);
        else contacts = [];
        
        if (savedMessages) messages = new Map(JSON.parse(savedMessages));
        else messages = new Map();
        
        saveData();
    }
    
    function saveData() {
        localStorage.setItem('ww_user_webrtc', JSON.stringify(currentUser));
        localStorage.setItem('ww_contacts_webrtc', JSON.stringify(contacts));
        localStorage.setItem('ww_messages_webrtc', JSON.stringify([...messages]));
    }
    
    // ==================== СОЗДАНИЕ СОЕДИНЕНИЯ (WebRTC) ====================
    async function createConnection(targetId) {
        console.log('Создание соединения с:', targetId);
        
        // Закрываем существующее соединение если есть
        if (peerConnections.has(targetId)) {
            const oldConn = peerConnections.get(targetId);
            oldConn.close();
            peerConnections.delete(targetId);
        }
        if (dataChannels.has(targetId)) {
            dataChannels.delete(targetId);
        }
        
        const pc = new RTCPeerConnection(configuration);
        peerConnections.set(targetId, pc);
        
        // Создаём data channel
        const dataChannel = pc.createDataChannel('chat');
        dataChannels.set(targetId, dataChannel);
        
        setupDataChannel(dataChannel, targetId);
        
        // Обработка ICE кандидатов
        pc.onicecandidate = (event) => {
            if (event.candidate) {
                // Отправляем кандидата через локальное хранилище (симуляция сигналинга)
                sendSignal(targetId, 'candidate', event.candidate);
            }
        };
        
        pc.oniceconnectionstatechange = () => {
            console.log(`ICE состояние для ${targetId}:`, pc.iceConnectionState);
            if (pc.iceConnectionState === 'connected') {
                updatePeerStatus(targetId, true);
            } else if (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed') {
                updatePeerStatus(targetId, false);
            }
        };
        
        // Создаём offer
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        
        // Отправляем offer через локальное хранилище
        sendSignal(targetId, 'offer', offer);
        
        return pc;
    }
    
    async function handleConnection(targetId) {
        console.log('Обработка входящего соединения от:', targetId);
        
        if (peerConnections.has(targetId)) {
            return peerConnections.get(targetId);
        }
        
        const pc = new RTCPeerConnection(configuration);
        peerConnections.set(targetId, pc);
        
        pc.ondatachannel = (event) => {
            const dataChannel = event.channel;
            dataChannels.set(targetId, dataChannel);
            setupDataChannel(dataChannel, targetId);
        };
        
        pc.onicecandidate = (event) => {
            if (event.candidate) {
                sendSignal(targetId, 'candidate', event.candidate);
            }
        };
        
        pc.oniceconnectionstatechange = () => {
            console.log(`ICE состояние для ${targetId}:`, pc.iceConnectionState);
            if (pc.iceConnectionState === 'connected') {
                updatePeerStatus(targetId, true);
            } else if (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed') {
                updatePeerStatus(targetId, false);
            }
        };
        
        return pc;
    }
    
    async function acceptOffer(targetId, offer) {
        const pc = await handleConnection(targetId);
        await pc.setRemoteDescription(new RTCSessionDescription(offer));
        
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        
        sendSignal(targetId, 'answer', answer);
    }
    
    async function acceptAnswer(targetId, answer) {
        const pc = peerConnections.get(targetId);
        if (pc) {
            await pc.setRemoteDescription(new RTCSessionDescription(answer));
        }
    }
    
    async function addIceCandidate(targetId, candidate) {
        const pc = peerConnections.get(targetId);
        if (pc && pc.remoteDescription) {
            try {
                await pc.addIceCandidate(new RTCIceCandidate(candidate));
            } catch (e) {
                console.error('Ошибка добавления кандидата:', e);
            }
        } else {
            // Сохраняем кандидата на потом
            if (!pendingIceCandidates.has(targetId)) {
                pendingIceCandidates.set(targetId, []);
            }
            pendingIceCandidates.get(targetId).push(candidate);
        }
    }
    
    function setupDataChannel(dataChannel, peerId) {
        dataChannel.onopen = () => {
            console.log('DataChannel открыт для:', peerId);
            updatePeerStatus(peerId, true);
            
            // Отправляем свою информацию
            sendInfo(peerId);
            
            // Добавляем в контакты
            let contact = contacts.find(c => c.peerId === peerId);
            if (!contact) {
                contact = {
                    peerId: peerId,
                    name: 'User_' + peerId.slice(-8),
                    avatar: null,
                    bio: '',
                    addedAt: Date.now()
                };
                contacts.push(contact);
                saveData();
                renderChatsList();
            }
        };
        
        dataChannel.onclose = () => {
            console.log('DataChannel закрыт для:', peerId);
            updatePeerStatus(peerId, false);
        };
        
        dataChannel.onerror = (err) => {
            console.error('DataChannel ошибка:', err);
        };
        
        dataChannel.onmessage = (event) => {
            const data = JSON.parse(event.data);
            handleIncomingData(peerId, data);
        };
    }
    
    function sendInfo(peerId) {
        const dataChannel = dataChannels.get(peerId);
        if (dataChannel && dataChannel.readyState === 'open') {
            dataChannel.send(JSON.stringify({
                type: 'info',
                name: currentUser.name,
                avatar: currentUser.avatar,
                bio: currentUser.bio,
                peerId: currentUser.id
            }));
        }
    }
    
    function sendMessageToPeer(peerId, text) {
        const dataChannel = dataChannels.get(peerId);
        if (dataChannel && dataChannel.readyState === 'open') {
            dataChannel.send(JSON.stringify({
                type: 'message',
                text: text,
                timestamp: Date.now(),
                sender: currentUser.id,
                senderName: currentUser.name,
                senderAvatar: currentUser.avatar
            }));
        } else {
            console.log('DataChannel не открыт для:', peerId);
            return false;
        }
        return true;
    }
    
    function sendTypingToPeer(peerId) {
        const dataChannel = dataChannels.get(peerId);
        if (dataChannel && dataChannel.readyState === 'open') {
            dataChannel.send(JSON.stringify({ type: 'typing' }));
        }
    }
    
    // ==================== СИГНАЛИНГ (через localStorage) ====================
    function sendSignal(targetId, type, data) {
        const signalKey = `ww_signal_${targetId}_${currentUser.id}`;
        const signal = {
            from: currentUser.id,
            to: targetId,
            type: type,
            data: data,
            timestamp: Date.now()
        };
        localStorage.setItem(signalKey, JSON.stringify(signal));
        
        // Устанавливаем таймер для очистки
        setTimeout(() => {
            if (localStorage.getItem(signalKey) === JSON.stringify(signal)) {
                localStorage.removeItem(signalKey);
            }
        }, 30000);
        
        // Проверяем сигналы от других
        setTimeout(() => checkSignals(), 500);
    }
    
    function checkSignals() {
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key && key.startsWith('ww_signal_')) {
                try {
                    const signal = JSON.parse(localStorage.getItem(key));
                    if (signal.to === currentUser.id) {
                        handleSignal(signal);
                        localStorage.removeItem(key);
                    } else if (Date.now() - signal.timestamp > 30000) {
                        // Удаляем старые сигналы
                        localStorage.removeItem(key);
                    }
                } catch(e) {}
            }
        }
    }
    
    async function handleSignal(signal) {
        console.log('Получен сигнал:', signal.type, 'от', signal.from);
        
        switch(signal.type) {
            case 'offer':
                await acceptOffer(signal.from, signal.data);
                break;
            case 'answer':
                await acceptAnswer(signal.from, signal.data);
                break;
            case 'candidate':
                await addIceCandidate(signal.from, signal.data);
                break;
        }
    }
    
    // ==================== ОБРАБОТКА ВХОДЯЩИХ ДАННЫХ ====================
    function handleIncomingData(peerId, data) {
        switch(data.type) {
            case 'info':
                updateContactInfo(peerId, data);
                break;
            case 'message':
                receiveMessage(peerId, data);
                break;
            case 'typing':
                showTypingIndicator(peerId);
                break;
        }
    }
    
    function updateContactInfo(peerId, info) {
        const contact = contacts.find(c => c.peerId === peerId);
        if (contact) {
            contact.name = info.name;
            contact.avatar = info.avatar;
            contact.bio = info.bio;
            saveData();
            renderChatsList();
            if (currentChatId === peerId) {
                document.getElementById('chatName').innerText = contact.name;
                document.getElementById('chatAvatar').innerHTML = contact.avatar ? `<img src="${contact.avatar}">` : contact.name.charAt(0).toUpperCase();
            }
        }
    }
    
    function updatePeerStatus(peerId, isConnected) {
        if (currentChatId === peerId) {
            const contact = contacts.find(c => c.peerId === peerId);
            if (contact) {
                document.getElementById('chatName').innerText = contact.name;
                document.getElementById('chatAvatar').innerHTML = contact.avatar ? `<img src="${contact.avatar}">` : contact.name.charAt(0).toUpperCase();
            }
            document.getElementById('peerStatus').innerHTML = isConnected ? '🟢 В сети' : '⚪ Не в сети';
            document.getElementById('peerStatus').className = isConnected ? 'peer-status connected' : 'peer-status';
            document.getElementById('messageInput').disabled = !isConnected;
            document.getElementById('sendBtn').disabled = !isConnected;
        }
        renderChatsList();
    }
    
    // ==================== ПОДКЛЮЧЕНИЕ К ПОЛЬЗОВАТЕЛЮ ====================
    async function connectToUser(targetId) {
        if (targetId === currentUser.id) {
            alert("❌ Нельзя добавить самого себя");
            return;
        }
        
        // Добавляем в контакты
        let contact = contacts.find(c => c.peerId === targetId);
        if (!contact) {
            contact = {
                peerId: targetId,
                name: 'User_' + targetId.slice(-8),
                avatar: null,
                bio: '',
                addedAt: Date.now()
            };
            contacts.push(contact);
            saveData();
            renderChatsList();
        }
        
        // Создаём соединение
        await createConnection(targetId);
        openChat(targetId);
        
        // Начинаем проверку сигналов
        setInterval(checkSignals, 2000);
    }
    
    function openChat(peerId) {
        currentChatId = peerId;
        renderMessages(peerId);
        renderChatsList();
        
        const contact = contacts.find(c => c.peerId === peerId);
        if (contact) {
            document.getElementById('chatName').innerText = contact.name;
            document.getElementById('chatAvatar').innerHTML = contact.avatar ? `<img src="${contact.avatar}">` : contact.name.charAt(0).toUpperCase();
        }
        
        const isConnected = dataChannels.has(peerId) && dataChannels.get(peerId).readyState === 'open';
        document.getElementById('peerStatus').innerHTML = isConnected ? '🟢 В сети' : '⚪ Не в сети';
        document.getElementById('peerStatus').className = isConnected ? 'peer-status connected' : 'peer-status';
        document.getElementById('messageInput').disabled = !isConnected;
        document.getElementById('sendBtn').disabled = !isConnected;
    }
    
    // ==================== СООБЩЕНИЯ ====================
    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text || !currentChatId) return;
        
        const success = sendMessageToPeer(currentChatId, text);
        if (!success) {
            alert("⚠️ Пользователь не в сети");
            return;
        }
        
        const chatMessages = messages.get(currentChatId) || [];
        chatMessages.push({
            text: text,
            timestamp: Date.now(),
            outgoing: true,
            senderName: currentUser.name,
            senderAvatar: currentUser.avatar,
            time: new Date().toLocaleTimeString().slice(0,5)
        });
        messages.set(currentChatId, chatMessages);
        saveData();
        
        renderMessages(currentChatId);
        input.value = '';
        renderChatsList();
    }
    
    function receiveMessage(peerId, data) {
        const contact = contacts.find(c => c.peerId === peerId);
        const senderName = data.senderName || contact?.name || 'Пользователь';
        const senderAvatar = data.senderAvatar || contact?.avatar;
        
        const chatMessages = messages.get(peerId) || [];
        chatMessages.push({
            text: data.text,
            timestamp: data.timestamp,
            outgoing: false,
            senderId: data.sender,
            senderName: senderName,
            senderAvatar: senderAvatar,
            time: new Date(data.timestamp).toLocaleTimeString().slice(0,5)
        });
        messages.set(peerId, chatMessages);
        saveData();
        
        if (currentChatId === peerId) {
            renderMessages(peerId);
        }
        renderChatsList();
    }
    
    function sendTyping() {
        if (!currentChatId) return;
        sendTypingToPeer(currentChatId);
        
        if (typingTimeout) clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
            document.getElementById('typingIndicator').style.display = 'none';
        }, 2000);
    }
    
    function showTypingIndicator(peerId) {
        if (currentChatId === peerId) {
            const contact = contacts.find(c => c.peerId === peerId);
            document.getElementById('typingIndicator').style.display = 'block';
            document.getElementById('typingIndicator').innerHTML = `${contact?.name || 'Пользователь'} печатает...`;
            setTimeout(() => {
                document.getElementById('typingIndicator').style.display = 'none';
            }, 2000);
        }
    }
    
    function renderMessages(chatId) {
        const container = document.getElementById('messagesArea');
        const chatMessages = messages.get(chatId) || [];
        if (chatMessages.length === 0) {
            container.innerHTML = '<div style="text-align:center;color:var(--text-muted);margin-top:60px;">💬 Напишите первое сообщение!</div>';
            return;
        }
        container.innerHTML = '';
        chatMessages.forEach(msg => {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${msg.outgoing ? 'outgoing' : 'incoming'}`;
            
            if (!msg.outgoing && msg.senderName) {
                msgDiv.innerHTML = `
                    <div class="message-author" data-user-id="${msg.senderId}" data-user-name="${escapeHtml(msg.senderName)}" data-user-avatar="${msg.senderAvatar || ''}">
                        <div class="avatar" style="width:24px;height:24px;font-size:12px;">${msg.senderAvatar ? `<img src="${msg.senderAvatar}">` : (msg.senderName?.charAt(0) || '👤')}</div>
                        <div class="message-author-name">${escapeHtml(msg.senderName)}</div>
                    </div>
                    <div class="message-text">${escapeHtml(msg.text)}</div>
                    <div class="message-time">${msg.time}</div>
                `;
                const authorDiv = msgDiv.querySelector('.message-author');
                authorDiv.onclick = () => {
                    showUserProfile(msg.senderId, msg.senderName, msg.senderAvatar);
                };
            } else {
                msgDiv.innerHTML = `
                    <div class="message-text">${escapeHtml(msg.text)}</div>
                    <div class="message-time">${msg.time}</div>
                `;
            }
            container.appendChild(msgDiv);
        });
        container.scrollTop = container.scrollHeight;
    }
    
    function renderChatsList() {
        const container = document.getElementById('chatsList');
        const chatIds = new Set([...messages.keys(), ...contacts.map(c => c.peerId)]);
        
        if (chatIds.size === 0) {
            container.innerHTML = '<div class="no-items">✨ Нет чатов<br>Введите ID друга в поиск</div>';
            return;
        }
        
        container.innerHTML = '';
        Array.from(chatIds).forEach(peerId => {
            const contact = contacts.find(c => c.peerId === peerId);
            if (!contact) return;
            
            const chatMessages = messages.get(peerId) || [];
            const lastMsg = chatMessages[chatMessages.length - 1];
            const isConnected = dataChannels.has(peerId) && dataChannels.get(peerId).readyState === 'open';
            
            const div = document.createElement('div');
            div.className = `chat-item ${currentChatId === peerId ? 'active' : ''}`;
            div.innerHTML = `
                <div class="chat-avatar" style="position:relative;">
                    ${contact.avatar ? `<img src="${contact.avatar}">` : `<span>${contact.name.charAt(0).toUpperCase()}</span>`}
                    ${isConnected ? '<div class="online-dot"></div>' : ''}
                </div>
                <div class="chat-details">
                    <div class="chat-name">${escapeHtml(contact.name)}</div>
                    <div class="chat-last-msg">${lastMsg ? escapeHtml(lastMsg.text.substring(0, 30)) : '✨ Новый чат'}</div>
                </div>
            `;
            div.onclick = () => openChat(peerId);
            container.appendChild(div);
        });
    }
    
    // ==================== ПРОФИЛЬ ====================
    function showUserProfile(userId, userName, userAvatar) {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <div style="text-align:center;">
                    <div class="avatar" style="width:100px;height:100px;margin:0 auto 16px;">
                        ${userAvatar ? `<img src="${userAvatar}">` : `<span style="font-size:48px;">${userName?.charAt(0).toUpperCase() || '👤'}</span>`}
                    </div>
                    <div style="font-size:22px; font-weight:700;">${escapeHtml(userName || 'Пользователь')}</div>
                    <div style="font-size:12px; color:var(--text-muted); background:var(--input-bg); padding:8px; border-radius:12px; margin-top:16px; word-break:break-all;">🆔 ${userId}</div>
                    ${userId !== currentUser.id ? `<button id="writeToUserBtn" style="margin-top:16px;">💬 Написать сообщение</button>` : ''}
                    <button id="closeProfileBtn" style="background:#3a3a3a; margin-top:10px;">Закрыть</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        if (userId !== currentUser.id) {
            modal.querySelector('#writeToUserBtn').onclick = () => {
                modal.remove();
                connectToUser(userId);
            };
        }
        modal.querySelector('#closeProfileBtn').onclick = () => modal.remove();
    }
    
    function showEditProfileModal() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h2>✏️ Редактировать профиль</h2>
                <input type="text" id="editName" placeholder="Имя" value="${escapeHtml(currentUser.name)}">
                <textarea id="editBio" placeholder="Описание профиля" rows="3">${escapeHtml(currentUser.bio || '')}</textarea>
                
                <div class="my-id-display">
                    <strong>🆔 Ваш ID:</strong><br>
                    <span style="font-family: monospace; font-size: 11px;">${currentUser.id}</span>
                    <button id="copyFullIdBtn" style="margin-top:8px; padding:6px 12px; font-size:12px;">📋 Копировать ID</button>
                </div>
                
                <div class="avatar-upload">
                    <div class="avatar-preview" id="avatarPreview">
                        ${currentUser.avatar ? `<img src="${currentUser.avatar}">` : `<span style="font-size:48px;">${currentUser.name.charAt(0).toUpperCase()}</span>`}
                    </div>
                    <label class="file-input-label">
                        📸 Загрузить фото
                        <input type="file" id="avatarUpload" accept="image/*" style="display:none;">
                    </label>
                    <button id="drawAvatarBtn" style="background:#3a3a3a; margin-top:10px;">🎨 Нарисовать</button>
                </div>
                <button id="saveProfileBtn">💾 Сохранить</button>
                <button id="cancelProfileBtn" style="background:#3a3a3a;">Отмена</button>
            </div>
        `;
        document.body.appendChild(modal);
        
        const fileInput = modal.querySelector('#avatarUpload');
        const preview = modal.querySelector('#avatarPreview');
        
        modal.querySelector('#copyFullIdBtn').onclick = () => {
            navigator.clipboard.writeText(currentUser.id);
            const btn = modal.querySelector('#copyFullIdBtn');
            btn.textContent = '✅ Скопировано!';
            setTimeout(() => btn.textContent = '📋 Копировать ID', 2000);
        };
        
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    preview.innerHTML = `<img src="${event.target.result}">`;
                    currentUser.avatar = event.target.result;
                    updateUserProfileUI();
                    // Отправляем обновление всем контактам
                    dataChannels.forEach((dc, peerId) => {
                        if (dc.readyState === 'open') {
                            dc.send(JSON.stringify({
                                type: 'info',
                                name: currentUser.name,
                                avatar: currentUser.avatar,
                                bio: currentUser.bio,
                                peerId: currentUser.id
                            }));
                        }
                    });
                };
                reader.readAsDataURL(file);
            }
        };
        
        modal.querySelector('#drawAvatarBtn').onclick = () => {
            modal.remove();
            showDrawingModal();
        };
        
        modal.querySelector('#saveProfileBtn').onclick = () => {
            const newName = modal.querySelector('#editName').value.trim();
            const newBio = modal.querySelector('#editBio').value.trim();
            if (newName) currentUser.name = newName;
            currentUser.bio = newBio || '';
            saveData();
            updateUserProfileUI();
            // Отправляем обновление всем контактам
            dataChannels.forEach((dc, peerId) => {
                if (dc.readyState === 'open') {
                    dc.send(JSON.stringify({
                        type: 'info',
                        name: currentUser.name,
                        avatar: currentUser.avatar,
                        bio: currentUser.bio,
                        peerId: currentUser.id
                    }));
                }
            });
            renderChatsList();
            modal.remove();
        };
        
        modal.querySelector('#cancelProfileBtn').onclick = () => modal.remove();
    }
    
    function showDrawingModal() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h2>🎨 Нарисовать аватар</h2>
                <canvas id="drawCanvas" width="200" height="200" style="background:white; border-radius:50%; cursor:crosshair; margin:0 auto; display:block;"></canvas>
                <div style="display:flex; gap:10px; margin-top:16px;">
                    <button id="saveDrawBtn">Сохранить</button>
                    <button id="clearDrawBtn">Очистить</button>
                    <button id="cancelDrawBtn">Отмена</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        const canvas = modal.querySelector('#drawCanvas');
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, 200, 200);
        ctx.fillStyle = '#000';
        ctx.font = 'bold 100px sans-serif';
        ctx.fillText('W', 65, 140);
        
        let drawing = false;
        canvas.addEventListener('mousedown', () => drawing = true);
        canvas.addEventListener('mouseup', () => drawing = false);
        canvas.addEventListener('mousemove', (e) => {
            if (!drawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * 200 / rect.width;
            const y = (e.clientY - rect.top) * 200 / rect.height;
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(x, y, 5, 0, Math.PI*2);
            ctx.fill();
        });
        
        modal.querySelector('#clearDrawBtn').onclick = () => {
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, 200, 200);
        };
        modal.querySelector('#saveDrawBtn').onclick = () => {
            currentUser.avatar = canvas.toDataURL();
            saveData();
            updateUserProfileUI();
            dataChannels.forEach((dc, peerId) => {
                if (dc.readyState === 'open') {
                    dc.send(JSON.stringify({
                        type: 'info',
                        name: currentUser.name,
                        avatar: currentUser.avatar,
                        bio: currentUser.bio,
                        peerId: currentUser.id
                    }));
                }
            });
            modal.remove();
        };
        modal.querySelector('#cancelDrawBtn').onclick = () => modal.remove();
    }
    
    function updateUserProfileUI() {
        document.getElementById('userName').innerText = currentUser.name;
        document.getElementById('userBio').innerText = currentUser.bio || 'Нет описания';
        const avatarDiv = document.getElementById('userAvatar');
        if (currentUser.avatar) {
            avatarDiv.innerHTML = `<img src="${currentUser.avatar}">`;
        } else {
            avatarDiv.innerHTML = currentUser.name.charAt(0).toUpperCase();
        }
    }
    
    function copyPeerId() {
        navigator.clipboard.writeText(currentUser.id).then(() => {
            const btn = document.getElementById('copyIdBtn');
            btn.textContent = '✅';
            setTimeout(() => btn.textContent = '📋', 2000);
        });
    }
    
    // ==================== ЗВОНКИ (WebRTC) ====================
    async function startCall(isVideo) {
        if (!currentChatId) { alert("Выберите чат"); return; }
        
        const dataChannel = dataChannels.get(currentChatId);
        if (!dataChannel || dataChannel.readyState !== 'open') {
            alert("Пользователь не в сети");
            return;
        }
        
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: isVideo });
            
            const pc = peerConnections.get(currentChatId);
            if (!pc) {
                alert("Ошибка соединения");
                return;
            }
            
            localStream.getTracks().forEach(track => {
                pc.addTrack(track, localStream);
            });
            
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            sendSignal(currentChatId, 'offer', offer);
            
            const callWindow = showCallWindow(isVideo);
            
            pc.ontrack = (event) => {
                const remoteVideo = callWindow.querySelector('#remoteVideo');
                if (remoteVideo) {
                    remoteVideo.srcObject = event.streams[0];
                }
            };
            
            pc.oniceconnectionstatechange = () => {
                if (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed') {
                    if (callWindow.parentNode) callWindow.remove();
                    endCall();
                }
            };
            
        } catch(err) {
            alert("❌ Не удалось получить доступ к камере/микрофону");
        }
    }
    
    function showCallWindow(isVideo) {
        const existingCall = document.querySelector('.call-modal');
        if (existingCall) existingCall.remove();
        
        const callWindow = document.createElement('div');
        callWindow.className = 'call-modal';
        callWindow.innerHTML = `
            <div style="text-align:center;">
                <video id="remoteVideo" autoplay playsinline style="width:100%; max-width:500px; border-radius:24px; background:#000;"></video>
                ${isVideo ? `<video id="localVideo" autoplay playsinline muted style="position:absolute; bottom:30px; right:30px; width:120px; border-radius:16px; border:2px solid var(--accent-color);"></video>` : ''}
            </div>
            <button id="endCallBtn" style="background:#c42e2e; padding:12px 40px; border:none; border-radius:40px; color:white; font-size:18px; cursor:pointer;">🔴 Завершить</button>
        `;
        document.body.appendChild(callWindow);
        
        if (isVideo && localStream) {
            const localVideo = callWindow.querySelector('#localVideo');
            if (localVideo) localVideo.srcObject = localStream;
        }
        
        callWindow.querySelector('#endCallBtn').onclick = () => {
            endCall();
            callWindow.remove();
        };
        
        return callWindow;
    }
    
    function endCall() {
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
        }
        if (activeCall) {
            activeCall.close();
            activeCall = null;
        }
    }
    
    // ==================== ВСПОМОГАТЕЛЬНЫЕ ====================
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // ==================== ИНИЦИАЛИЗАЦИЯ ====================
    function bindEvents() {
        document.getElementById('searchBtn').onclick = () => {
            const input = document.getElementById('searchInput');
            const peerId = input.value.trim();
            if (peerId) {
                connectToUser(peerId);
                input.value = '';
            }
        };
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('searchBtn').click();
        });
        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
            else sendTyping();
        });
        document.getElementById('audioCallBtn').onclick = () => startCall(false);
        document.getElementById('videoCallBtn').onclick = () => startCall(true);
        document.getElementById('userProfileBtn').onclick = showEditProfileModal;
        document.getElementById('copyIdBtn').onclick = copyPeerId;
        
        // Запускаем проверку сигналов
        setInterval(checkSignals, 2000);
    }
    
    loadData();
    bindEvents();
    updateUserProfileUI();
    renderChatsList();
    
    // Показываем ID при загрузке
    document.getElementById('peerIdText').innerText = currentUser.id.slice(0, 20) + '...';
    document.getElementById('connectionStatus').innerHTML = '🟢 Готов';
</script>
