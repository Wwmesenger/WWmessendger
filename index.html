<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Мессенджер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
            touch-action: pan-x pan-y;
        }

        /* Десктоп версия */
        @media (min-width: 769px) {
            body { background: #1a1a1a; display: flex; justify-content: center; align-items: center; }
            .app-container { width: 500px; height: 90vh; max-height: 800px; border-radius: 28px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); position: relative; }
        }
        .app-container { width: 100%; height: 100%; background: #0a0a0a; display: flex; flex-direction: column; position: relative; }
        
        /* Шапка */
        .app-header { padding: 12px 16px; background: #0e0e0e; border-bottom: 1px solid #202020; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .logo { font-size: 20px; font-weight: 700; background: linear-gradient(135deg, #fff, #888); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .header-actions { display: flex; gap: 12px; }
        .icon-btn { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; padding: 8px; touch-action: manipulation; }
        
        /* Поиск */
        .search-container { padding: 12px 16px; background: #0e0e0e; border-bottom: 1px solid #202020; display: flex; gap: 12px; flex-shrink: 0; }
        .search-wrapper { flex: 1; display: flex; background: #1a1a1a; border-radius: 12px; padding: 8px 12px; gap: 8px; align-items: center; }
        .search-icon { color: #666; font-size: 16px; }
        .search-input { flex: 1; background: none; border: none; color: #fff; font-size: 14px; outline: none; }
        .search-input::placeholder { color: #555; }
        .search-type { background: #2a2a2a; border: none; color: #fff; padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; }
        .search-btn { background: #2a6f4f; border: none; color: #fff; padding: 6px 16px; border-radius: 20px; font-size: 12px; cursor: pointer; }
        
        /* Результаты поиска */
        .results-area { flex: 1; overflow-y: auto; display: none; background: #0a0a0a; }
        .results-list { list-style: none; }
        .result-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid #1a1a1a; cursor: pointer; touch-action: manipulation; }
        .result-item:active { background: #1a1a1a; }
        .avatar { width: 48px; height: 48px; border-radius: 50%; background: #2a6f4f; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 600; flex-shrink: 0; }
        .result-info { flex: 1; }
        .result-name { font-weight: 500; }
        .result-detail { font-size: 12px; color: #888; }
        .back-to-chats { padding: 12px 16px; background: #0e0e0e; border-bottom: 1px solid #202020; display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; }
        
        /* Чат */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #0a0a0a; position: relative; height: 100%; }
        .chat-header { padding: 12px 16px; background: #0e0e0e; border-bottom: 1px solid #202020; display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; flex-shrink: 0; }
        .chat-contact { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
        .chat-contact .avatar { width: 44px; height: 44px; font-size: 20px; }
        .chat-contact .chat-name { font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-actions { display: flex; gap: 8px; }
        
        /* Сообщения */
        .messages-area { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .message { display: flex; flex-direction: column; max-width: 80%; }
        .message-out { align-self: flex-end; }
        .message-in { align-self: flex-start; }
        .message-bubble { padding: 10px 14px; border-radius: 20px; font-size: 14px; word-wrap: break-word; }
        .message-out .message-bubble { background: #2a6f4f; color: #fff; border-bottom-right-radius: 4px; }
        .message-in .message-bubble { background: #1e1e1e; color: #fff; border-bottom-left-radius: 4px; }
        .message-time { font-size: 9px; color: #aaa; margin-top: 4px; text-align: right; }
        .message-sender { font-size: 10px; color: #888; margin-bottom: 4px; }
        
        /* Область ввода - фиксированная внизу */
        .input-area { 
            padding: 12px 16px; 
            background: #0e0e0e; 
            border-top: 1px solid #202020; 
            display: flex; 
            gap: 12px; 
            align-items: center;
            flex-shrink: 0;
        }
        .message-input { 
            flex: 1; 
            padding: 12px 16px; 
            background: #1a1a1a; 
            border: none; 
            border-radius: 24px; 
            color: #fff; 
            font-size: 14px;
            outline: none;
        }
        .action-btn { 
            background: #2a6f4f; 
            border: none; 
            width: 44px; 
            height: 44px; 
            border-radius: 50%; 
            color: #fff; 
            font-size: 20px; 
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }
        
        /* Эмодзи пикер */
        .emoji-picker-container {
            position: fixed;
            bottom: 80px;
            right: 16px;
            z-index: 1000;
            display: none;
            background: #1e1e1e;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .emoji-picker-container.show {
            display: block;
        }
        .emoji-picker {
            width: 320px;
            max-height: 400px;
            overflow-y: auto;
            padding: 12px;
        }
        .emoji-category-title {
            color: #888;
            font-size: 12px;
            margin-bottom: 8px;
            padding-left: 4px;
        }
        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 8px;
        }
        .emoji-item {
            font-size: 28px;
            cursor: pointer;
            text-align: center;
            padding: 8px;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .emoji-item:active {
            background: #2a2a2a;
        }
        
        /* Мобильные стили */
        @media (max-width: 768px) {
            .input-area {
                padding: 12px 16px !important;
                padding-bottom: calc(12px + env(safe-area-inset-bottom, 12px)) !important;
            }
            .message-input {
                padding: 14px 18px !important;
                font-size: 16px !important;
            }
            .action-btn {
                width: 48px !important;
                height: 48px !important;
                min-width: 48px !important;
            }
            .chat-area {
                padding-bottom: env(safe-area-inset-bottom, 0);
            }
            .emoji-picker {
                width: 280px;
                max-height: 350px;
            }
            .emoji-grid {
                grid-template-columns: repeat(7, 1fr);
            }
            .emoji-picker-container {
                bottom: 70px;
                right: 12px;
            }
        }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #2a6f4f; border-radius: 4px; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="app-header">
        <div class="logo">WW Messenger</div>
        <div class="header-actions">
            <button class="icon-btn" id="profileBtn">👤</button>
            <button class="icon-btn" id="logoutBtn" style="display: none;">🚪</button>
        </div>
    </div>
    
    <div class="search-container">
        <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" class="search-input" placeholder="Поиск">
            <select id="searchType" class="search-type">
                <option value="uid">По UID</option>
                <option value="username">По имени</option>
            </select>
        </div>
        <button id="searchBtn" class="search-btn">Найти</button>
    </div>
    
    <!-- Результаты поиска -->
    <div id="resultsArea" class="results-area">
        <div class="back-to-chats" id="backToChatsBtn">← Назад к чатам</div>
        <ul id="resultsList" class="results-list"></ul>
    </div>
    
    <!-- Чат -->
    <div id="chatArea" class="chat-area" style="display: none;">
        <div class="chat-header">
            <div class="chat-contact" id="chatContact">
                <div class="avatar"></div>
                <div class="chat-name"></div>
            </div>
            <div class="chat-actions">
                <button class="icon-btn" id="chatInfoBtn">ℹ️</button>
            </div>
        </div>
        <div id="messagesArea" class="messages-area"></div>
        <div class="input-area">
            <button id="emojiPickerBtn" class="action-btn" type="button">😊</button>
            <input type="text" id="messageInput" class="message-input" placeholder="Сообщение" autocomplete="off">
            <button id="sendMessageBtn" class="action-btn" type="button">➤</button>
        </div>
    </div>
</div>

<script>
    // ==================== ЭМОДЗИ ПИКЕР ====================
    let emojiPickerContainer = null;
    
    function createEmojiPicker() {
        if (emojiPickerContainer) return;
        
        const emojis = ['😊', '😂', '❤️', '👍', '🔥', '🎉', '😢', '😍', '😎', '🤔', '🥺', '😭', '🤣', '🙏', '💀', '👀', '✨', '💯', '🤡', '🥴', '😘', '💔', '💪', '👋', '🎈', '⭐', '🌙', '🌈'];
        
        emojiPickerContainer = document.createElement('div');
        emojiPickerContainer.className = 'emoji-picker-container';
        emojiPickerContainer.innerHTML = `
            <div class="emoji-picker">
                <div class="emoji-category-title">😊 Эмодзи</div>
                <div class="emoji-grid" id="emojiGrid"></div>
            </div>
        `;
        
        document.body.appendChild(emojiPickerContainer);
        
        const emojiGrid = document.getElementById('emojiGrid');
        emojis.forEach(emoji => {
            const emojiItem = document.createElement('div');
            emojiItem.className = 'emoji-item';
            emojiItem.textContent = emoji;
            emojiItem.onclick = () => {
                const messageInput = document.getElementById('messageInput');
                if (messageInput) {
                    const cursorPos = messageInput.selectionStart;
                    const textBefore = messageInput.value.substring(0, cursorPos);
                    const textAfter = messageInput.value.substring(cursorPos);
                    messageInput.value = textBefore + emoji + textAfter;
                    messageInput.focus();
                    messageInput.selectionStart = cursorPos + emoji.length;
                    messageInput.selectionEnd = cursorPos + emoji.length;
                    closeEmojiPicker();
                }
            };
            emojiGrid.appendChild(emojiItem);
        });
        
        document.addEventListener('click', (e) => {
            if (emojiPickerContainer && emojiPickerContainer.classList.contains('show')) {
                const emojiBtn = document.getElementById('emojiPickerBtn');
                if (!emojiPickerContainer.contains(e.target) && e.target !== emojiBtn && !emojiBtn.contains(e.target)) {
                    closeEmojiPicker();
                }
            }
        });
    }
    
    function toggleEmojiPicker() {
        if (!emojiPickerContainer) createEmojiPicker();
        emojiPickerContainer.classList.toggle('show');
    }
    
    function closeEmojiPicker() {
        if (emojiPickerContainer) emojiPickerContainer.classList.remove('show');
    }
    
    // ==================== АДАПТАЦИЯ ПОД МОБИЛЬНУЮ КЛАВИАТУРУ ====================
    function adjustViewportHeight() {
        if (window.innerWidth <= 768) {
            const vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
            const chatArea = document.querySelector('.chat-area');
            if (chatArea) chatArea.style.height = `${window.innerHeight}px`;
        }
    }
    
    window.addEventListener('resize', adjustViewportHeight);
    window.addEventListener('orientationchange', adjustViewportHeight);
    
    // ==================== ОСТАЛЬНОЙ ФУНКЦИОНАЛ МЕССЕНДЖЕРА ====================
    let currentUser = null;
    let currentChat = null;
    let currentSearchType = 'uid';
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    
    async function apiRequest(endpoint, method = 'GET', body = null) {
        const options = { method, headers: { 'Content-Type': 'application/json' } };
        if (body) options.body = JSON.stringify(body);
        const response = await fetch(`/api/${endpoint}`, options);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.json();
    }
    
    async function checkAuth() {
        try {
            const data = await apiRequest('auth/check');
            if (data.authenticated && data.user) {
                currentUser = data.user;
                document.getElementById('logoutBtn').style.display = 'block';
                loadChats();
            } else {
                window.location.href = '/login';
            }
        } catch (e) {
            window.location.href = '/login';
        }
    }
    
    async function loadChats() {
        try {
            const data = await apiRequest('chats');
            renderChats(data.chats || []);
        } catch (e) { console.error('Ошибка загрузки чатов:', e); }
    }
    
    function renderChats(chats) {
        const resultsList = document.getElementById('resultsList');
        resultsList.innerHTML = '';
        chats.forEach(chat => {
            const li = document.createElement('li');
            li.className = 'result-item';
            li.innerHTML = `
                <div class="avatar">${escapeHtml(chat.name?.charAt(0) || '?')}</div>
                <div class="result-info">
                    <div class="result-name">${escapeHtml(chat.name)}</div>
                    <div class="result-detail">${chat.type === 'group' ? 'Группа' : 'Канал'}</div>
                </div>
            `;
            li.onclick = () => openChat(chat);
            resultsList.appendChild(li);
        });
    }
    
    async function openChat(chat) {
        currentChat = chat;
        document.getElementById('resultsArea').style.display = 'none';
        document.getElementById('chatArea').style.display = 'flex';
        
        document.getElementById('chatContact').innerHTML = `
            <div class="avatar">${escapeHtml(chat.name?.charAt(0) || '?')}</div>
            <div class="chat-name">${escapeHtml(chat.name)}</div>
        `;
        
        await loadMessages();
        subscribeToMessages();
    }
    
    async function loadMessages() {
        if (!currentChat) return;
        try {
            const data = await apiRequest(`messages/${currentChat.id}`);
            renderMessages(data.messages || []);
        } catch (e) { console.error('Ошибка загрузки сообщений:', e); }
    }
    
    function renderMessages(messages) {
        const container = document.getElementById('messagesArea');
        container.innerHTML = '';
        messages.forEach(msg => {
            const isOut = msg.sender_id === currentUser?.id;
            const div = document.createElement('div');
            div.className = `message ${isOut ? 'message-out' : 'message-in'}`;
            div.innerHTML = `
                ${!isOut ? `<div class="message-sender">${escapeHtml(msg.sender_name)}</div>` : ''}
                <div class="message-bubble">${escapeHtml(msg.text)}</div>
                <div class="message-time">${new Date(msg.created_at).toLocaleTimeString()}</div>
            `;
            container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
    }
    
    function subscribeToMessages() {
        if (!currentChat) return;
        const eventSource = new EventSource(`/api/subscribe/messages/${currentChat.id}`);
        eventSource.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            if (msg.sender_id !== currentUser?.id) {
                const container = document.getElementById('messagesArea');
                const isOut = msg.sender_id === currentUser?.id;
                const div = document.createElement('div');
                div.className = `message ${isOut ? 'message-out' : 'message-in'}`;
                div.innerHTML = `
                    ${!isOut ? `<div class="message-sender">${escapeHtml(msg.sender_name)}</div>` : ''}
                    <div class="message-bubble">${escapeHtml(msg.text)}</div>
                    <div class="message-time">${new Date(msg.created_at).toLocaleTimeString()}</div>
                `;
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
            }
        };
    }
    
    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text || !currentChat) return;
        
        try {
            await apiRequest(`messages/${currentChat.id}`, 'POST', { text });
            input.value = '';
            await loadMessages();
        } catch (e) { console.error('Ошибка отправки:', e); }
    }
    
    async function renderSearchResults(query) {
        if (!query.trim()) {
            document.getElementById('resultsArea').style.display = 'none';
            return;
        }
        
        try {
            let results = [];
            if (currentSearchType === 'uid') {
                const data = await apiRequest(`search/uid/${query}`);
                results = data.users || [];
            } else {
                const data = await apiRequest(`search/username/${query}`);
                results = data.users || [];
            }
            
            const list = document.getElementById('resultsList');
            list.innerHTML = '';
            results.forEach(user => {
                const li = document.createElement('li');
                li.className = 'result-item';
                li.innerHTML = `
                    <div class="avatar">${escapeHtml(user.username?.charAt(0) || '?')}</div>
                    <div class="result-info">
                        <div class="result-name">${escapeHtml(user.username)}</div>
                        <div class="result-detail">UID: ${escapeHtml(user.uid)}</div>
                    </div>
                `;
                li.onclick = () => startChatWithUser(user);
                list.appendChild(li);
            });
            document.getElementById('resultsArea').style.display = 'block';
        } catch (e) { console.error('Ошибка поиска:', e); }
    }
    
    async function startChatWithUser(user) {
        try {
            const data = await apiRequest('chats/private', 'POST', { user_id: user.id });
            openChat({ id: data.chat_id, name: user.username, type: 'private' });
        } catch (e) { console.error('Ошибка создания чата:', e); }
    }
    
    // Инициализация
    document.addEventListener('DOMContentLoaded', () => {
        checkAuth();
        adjustViewportHeight();
        
        document.getElementById('emojiPickerBtn').onclick = (e) => {
            e.stopPropagation();
            toggleEmojiPicker();
        };
        
        document.getElementById('sendMessageBtn').onclick = sendMessage;
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        document.getElementById('searchBtn').onclick = () => {
            const query = document.getElementById('searchInput').value;
            renderSearchResults(query);
        };
        
        document.getElementById('searchType').onchange = (e) => {
            currentSearchType = e.target.value;
        };
        
        document.getElementById('backToChatsBtn').onclick = () => {
            document.getElementById('resultsArea').style.display = 'none';
            loadChats();
        };
        
        document.getElementById('profileBtn').onclick = () => {
            alert(`Профиль: ${currentUser?.username || 'Пользователь'}\nUID: ${currentUser?.uid || 'Неизвестен'}`);
        };
        
        document.getElementById('logoutBtn').onclick = async () => {
            await apiRequest('auth/logout', 'POST');
            window.location.href = '/login';
        };
    });
</script>
</body>
</html>
