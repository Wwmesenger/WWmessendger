<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ww - Мессенджер с Firebase</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <style>
        :root {
            --bg-primary: #000000;
            --bg-secondary: #0c0c0c;
            --bg-tertiary: #050505;
            --bg-hover: #141414;
            --bg-active: #1e2a1e;
            --border-color: #1f1f1f;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --text-muted: #666666;
            --message-outgoing: #2b6e4c;
            --message-incoming: #202020;
            --accent-color: #4caf50;
            --avatar-bg: #202020;
            --input-bg: #1a1a1a;
            --input-border: #2c2c2c;
            --modal-bg: #131313;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }
        
        .app {
            display: flex;
            height: 100vh;
            width: 100%;
        }
        
        .sidebar {
            width: 320px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }
        
        .sidebar-header {
            padding: 16px 20px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo span {
            background: var(--text-primary);
            color: var(--bg-primary);
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 26px;
            font-weight: 900;
        }
        
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-tertiary);
        }
        
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
            font-size: 14px;
            font-weight: 500;
        }
        
        .tab.active {
            color: var(--accent-color);
            border-bottom: 2px solid var(--accent-color);
        }
        
        .settings-btn {
            background: var(--avatar-bg);
            border: none;
            color: var(--text-primary);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .connection-status {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            background: #2a2a2a;
        }
        
        .connection-status.online {
            background: var(--accent-color);
        }
        
        .debug-console {
            position: fixed;
            bottom: 10px;
            right: 10px;
            width: 300px;
            max-height: 200px;
            background: rgba(0,0,0,0.9);
            color: #0f0;
            font-size: 10px;
            overflow-y: auto;
            padding: 8px;
            border-radius: 8px;
            z-index: 9999;
            font-family: monospace;
            border: 1px solid #333;
            pointer-events: none;
        }
        
        .debug-console .debug-entry {
            border-bottom: 1px solid #333;
            padding: 2px 0;
            word-break: break-all;
        }
        
        .search-container {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .search-input {
            width: 100%;
            padding: 10px 16px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-primary);
            border-radius: 24px;
            outline: none;
            font-size: 14px;
        }
        
        .search-input:focus {
            border-color: var(--accent-color);
        }
        
        .search-results {
            background: var(--bg-hover);
            border-radius: 12px;
            margin-top: 8px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .search-result-item {
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
        }
        
        .search-result-item:hover {
            background: var(--bg-active);
        }
        
        .user-profile {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
        }
        
        .avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: var(--avatar-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: bold;
            overflow: hidden;
            position: relative;
            flex-shrink: 0;
        }
        
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .online-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent-color);
            position: absolute;
            bottom: 2px;
            right: 2px;
            border: 2px solid var(--bg-secondary);
        }
        
        .user-info {
            flex: 1;
            min-width: 0;
        }
        
        .user-name {
            font-weight: 700;
            font-size: 15px;
        }
        
        .user-bio {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .user-phone {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 2px;
        }
        
        .copy-id-btn {
            background: var(--avatar-bg);
            border: none;
            color: var(--text-primary);
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 10px;
            cursor: pointer;
            margin-left: 8px;
        }
        
        .chats-list, .channels-list {
            flex: 1;
            overflow-y: auto;
        }
        
        .create-channel-btn {
            background: var(--accent-color);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 24px;
            font-size: 12px;
            cursor: pointer;
            margin: 12px 16px;
            width: calc(100% - 32px);
        }
        
        .chat-item, .channel-item {
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
        }
        
        .chat-item:hover, .channel-item:hover {
            background: var(--bg-hover);
        }
        
        .chat-item.active, .channel-item.active {
            background: var(--bg-active);
            border-left: 3px solid var(--accent-color);
        }
        
        .chat-avatar, .channel-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--avatar-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            overflow: hidden;
            flex-shrink: 0;
        }
        
        .chat-details, .channel-details {
            flex: 1;
            min-width: 0;
        }
        
        .chat-name, .channel-name {
            font-weight: 600;
            font-size: 15px;
        }
        
        .chat-last-msg {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
        }
        
        .chat-header {
            padding: 16px 24px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .chat-contact {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        
        .call-buttons {
            display: flex;
            gap: 18px;
        }
        
        .call-btn {
            background: var(--avatar-bg);
            border: none;
            color: var(--text-primary);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 22px;
        }
        
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .message {
            max-width: 70%;
            padding: 10px 16px;
            border-radius: 22px;
            animation: fadeIn 0.2s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px);}
            to { opacity: 1; transform: translateY(0);}
        }
        
        .message.outgoing {
            background: var(--message-outgoing);
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }
        
        .message.incoming {
            background: var(--message-incoming);
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }
        
        .message-author {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            cursor: pointer;
        }
        
        .message-author-name {
            font-size: 12px;
            color: var(--accent-color);
            font-weight: 500;
        }
        
        .message-text {
            font-size: 14px;
            word-wrap: break-word;
        }
        
        .message-time {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 5px;
            text-align: right;
        }
        
        .input-area {
            padding: 16px 20px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 14px;
        }
        
        .message-input {
            flex: 1;
            padding: 12px 18px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-primary);
            border-radius: 32px;
            outline: none;
        }
        
        .send-btn {
            background: var(--accent-color);
            border: none;
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.96);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        
        .modal-content {
            background: var(--modal-bg);
            padding: 32px;
            border-radius: 32px;
            width: 460px;
            max-width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }
        
        .modal-content h2 {
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .modal-content input, .modal-content textarea, .modal-content select {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-primary);
            border-radius: 18px;
            font-size: 14px;
        }
        
        .modal-content button {
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            background: var(--accent-color);
            border: none;
            color: white;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
        }
        
        .modal-content button.danger {
            background: #c42e2e;
        }
        
        .verification-code-input {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 15px 0;
        }
        
        .verification-code-input input {
            width: 50px;
            text-align: center;
            font-size: 24px;
        }
        
        .setting-item {
            margin-bottom: 20px;
        }
        
        .setting-item label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        .color-preview {
            width: 40px;
            height: 40px;
            border-radius: 20px;
            margin-top: 8px;
            border: 2px solid var(--border-color);
        }
        
        .support-email {
            background: var(--input-bg);
            padding: 12px;
            border-radius: 16px;
            text-align: center;
            margin-top: 20px;
        }
        
        .support-email a {
            color: var(--accent-color);
            text-decoration: none;
        }
        
        .channel-stats {
            background: var(--input-bg);
            padding: 12px;
            border-radius: 16px;
            margin: 15px 0;
        }
        
        .my-id-display {
            background: var(--input-bg);
            padding: 12px;
            border-radius: 16px;
            margin: 15px 0;
            word-break: break-all;
            font-size: 12px;
            font-family: monospace;
            text-align: center;
        }
        
        .role-badge {
            font-size: 10px;
            background: var(--accent-color);
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            margin-left: 8px;
        }
        
        .typing-indicator {
            font-size: 12px;
            color: var(--text-secondary);
            padding: 8px 20px;
            font-style: italic;
        }
        
        .no-items {
            text-align: center;
            color: var(--text-muted);
            padding: 40px 20px;
            font-size: 14px;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent-color);
            border-radius: 10px;
        }
        
        @media (max-width: 640px) {
            .sidebar {
                width: 80px;
            }
            .user-info, .chat-details, .tab span {
                display: none;
            }
            .tab {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
<div class="app" id="app">
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="logo"><span>Ww</span></div>
            <button class="settings-btn" id="settingsBtn">⚙️</button>
        </div>
        
        <div class="tabs">
            <div class="tab active" data-tab="chats">💬 Чаты</div>
            <div class="tab" data-tab="channels">📢 Каналы</div>
        </div>
        
        <div class="search-container">
            <input type="text" class="search-input" id="searchInput" placeholder="🔍 Поиск по номеру или имени...">
            <div class="search-results" id="searchResults"></div>
        </div>
        
        <div class="user-profile" id="userProfileBtn">
            <div class="avatar" id="userAvatar" style="position:relative;">W</div>
            <div class="user-info">
                <div class="user-name" id="userName"></div>
                <div class="user-bio" id="userBio"></div>
                <div class="user-phone" id="userPhone"></div>
            </div>
        </div>

        <div id="chatsPanel" style="display:flex; flex-direction:column; flex:1;">
            <div class="chats-list" id="chatsList">
                <div class="no-items">✨ Нет чатов<br>Найдите друга по номеру телефона</div>
            </div>
        </div>
        
        <div id="channelsPanel" style="display:none; flex-direction:column; flex:1;">
            <button class="create-channel-btn" id="createChannelBtn">➕ Создать канал</button>
            <div class="channels-list" id="channelsList">
                <div class="no-items">📢 Нет каналов<br>Создайте свой первый канал!</div>
            </div>
        </div>
    </div>

    <div class="chat-area">
        <div class="chat-header">
            <div class="chat-contact">
                <div class="chat-avatar" id="chatAvatar">✨</div>
                <div>
                    <div class="chat-name" id="chatName">Ww Мессенджер</div>
                    <div class="peer-status" id="peerStatus">⚪ Выберите чат</div>
                </div>
            </div>
            <div class="call-buttons" id="callButtons">
                <button class="call-btn" id="audioCallBtn" title="Аудиозвонок">📞</button>
                <button class="call-btn" id="videoCallBtn" title="Видеозвонок">📹</button>
                <button class="call-btn" id="channelSettingsBtn" title="Настройки канала" style="display:none;">⚙️</button>
                <button class="subscribe-btn" id="subscribeChannelBtn" style="display:none;">📢 Подписаться</button>
            </div>
        </div>
        <div class="messages-area" id="messagesArea">
            <div style="text-align:center;color:var(--text-muted);margin-top:60px;">
                💬 <strong>Добро пожаловать в Ww!</strong><br><br>
                📝 Войдите по номеру телефона<br>
                🎨 Настройки темы и цвета в ⚙️
            </div>
        </div>
        <div class="typing-indicator" id="typingIndicator" style="display:none;"></div>
        <div class="input-area" id="inputArea">
            <input type="text" class="message-input" id="messageInput" placeholder="Сообщение...">
            <button class="send-btn" id="sendBtn">➤</button>
        </div>
    </div>
</div>

<div class="debug-console" id="debugConsole">
    <div style="color:#fff; font-weight:bold; margin-bottom:5px;">🐛 DEBUG LOG</div>
</div>

<script>
    // ==================== DEBUG ЛОГГЕР ====================
    function debugLog(message, type = 'info') {
        const consoleDiv = document.getElementById('debugConsole');
        const entry = document.createElement('div');
        entry.className = 'debug-entry';
        const time = new Date().toLocaleTimeString();
        const colors = { info: '#0f0', error: '#f00', warn: '#ff0', success: '#0f0' };
        entry.style.color = colors[type] || '#0f0';
        entry.innerHTML = `[${time}] ${message}`;
        consoleDiv.appendChild(entry);
        consoleDiv.scrollTop = consoleDiv.scrollHeight;
        
        // Ограничиваем количество записей
        while (consoleDiv.children.length > 50) {
            consoleDiv.removeChild(consoleDiv.children[1]);
        }
        
        // Также выводим в консоль браузера
        if (type === 'error') console.error(message);
        else if (type === 'warn') console.warn(message);
        else console.log(message);
    }
    
    // ==================== FIREBASE КОНФИГУРАЦИЯ ====================
    const firebaseConfig = {
        apiKey: "AIzaSyC9LeAGYFBAo2l-7Oc7knloS5eAoYVwLL8",
        authDomain: "wwmesenger-13acb.firebaseapp.com",
        projectId: "wwmesenger-13acb",
        storageBucket: "wwmesenger-13acb.firebasestorage.app",
        messagingSenderId: "238573008049",
        appId: "1:238573008049:web:12089ae7a0626b57395e90",
        measurementId: "G-X11NS1BPZL"
    };
    
    debugLog("Инициализация Firebase...", 'info');
    
    // Инициализация Firebase
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
        debugLog("Firebase инициализирован успешно", 'success');
    } else {
        debugLog("Firebase уже был инициализирован", 'info');
    }
    
    const auth = firebase.auth();
    const db = firebase.firestore();
    const storage = firebase.storage();
    
    // Настройка persistence
    auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
        .then(() => debugLog("Persistence установлен на LOCAL", 'success'))
        .catch(err => debugLog(`Ошибка persistence: ${err.message}`, 'error'));
    
    // ==================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ====================
    let currentUser = null;
    let currentUserData = null;
    let currentChatId = null;
    let currentChannelId = null;
    let activeTab = 'chats';
    let users = [];
    let channels = [];
    let subscribedChannels = new Set();
    let unsubscribeMessages = null;
    let unsubscribeChats = null;
    let unsubscribeChannels = null;
    let recaptchaVerifier = null;
    
    // ==================== НАСТРОЙКИ ТЕМЫ ====================
    let settings = {
        theme: 'dark',
        messageColor: '#2b6e4c'
    };
    
    function loadSettings() {
        const savedSettings = localStorage.getItem('ww_settings_firebase');
        if (savedSettings) {
            settings = JSON.parse(savedSettings);
            debugLog("Настройки загружены", 'info');
        }
        applyTheme();
    }
    
    function saveSettings() {
        localStorage.setItem('ww_settings_firebase', JSON.stringify(settings));
        debugLog("Настройки сохранены", 'success');
    }
    
    function applyTheme() {
        const root = document.documentElement;
        if (settings.theme === 'light') {
            root.style.setProperty('--bg-primary', '#f5f5f5');
            root.style.setProperty('--bg-secondary', '#ffffff');
            root.style.setProperty('--bg-tertiary', '#f0f0f0');
            root.style.setProperty('--bg-hover', '#e8e8e8');
            root.style.setProperty('--bg-active', '#e0f0e0');
            root.style.setProperty('--border-color', '#e0e0e0');
            root.style.setProperty('--text-primary', '#1a1a1a');
            root.style.setProperty('--text-secondary', '#666666');
            root.style.setProperty('--text-muted', '#999999');
            root.style.setProperty('--message-outgoing', settings.messageColor);
            root.style.setProperty('--message-incoming', '#e8e8e8');
            root.style.setProperty('--avatar-bg', '#e0e0e0');
            root.style.setProperty('--input-bg', '#ffffff');
            root.style.setProperty('--input-border', '#dddddd');
            root.style.setProperty('--modal-bg', '#ffffff');
        } else {
            root.style.setProperty('--bg-primary', '#000000');
            root.style.setProperty('--bg-secondary', '#0c0c0c');
            root.style.setProperty('--bg-tertiary', '#050505');
            root.style.setProperty('--bg-hover', '#141414');
            root.style.setProperty('--bg-active', '#1e2a1e');
            root.style.setProperty('--border-color', '#1f1f1f');
            root.style.setProperty('--text-primary', '#ffffff');
            root.style.setProperty('--text-secondary', '#888888');
            root.style.setProperty('--text-muted', '#666666');
            root.style.setProperty('--message-outgoing', settings.messageColor);

    // ==================== ЗВУКИ ====================
    function playBeep(frequency, duration, volume = 0.15) {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.frequency.value = frequency;
            gainNode.gain.value = volume;
            oscillator.start();
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            oscillator.stop(audioCtx.currentTime + duration);
            debugLog(`Звук: ${frequency}Hz`, 'info');
        } catch(e) {
            debugLog(`Ошибка воспроизведения звука: ${e.message}`, 'warn');
        }
    }
    
    // ==================== АУТЕНТИФИКАЦИЯ ====================
    function initRecaptcha() {
        try {
            if (recaptchaVerifier) {
                recaptchaVerifier.clear();
            }
            recaptchaVerifier = new firebase.auth.RecaptchaVerifier('sendCodeBtn', {
                size: 'invisible',
                callback: () => {
                    debugLog("reCAPTCHA callback вызван", 'info');
                },
                'expired-callback': () => {
                    debugLog("reCAPTCHA истекла", 'warn');
                    initRecaptcha();
                }
            });
            debugLog("reCAPTCHA инициализирован", 'success');
        } catch(err) {
            debugLog(`Ошибка инициализации reCAPTCHA: ${err.message}`, 'error');
        }
    }
    
    function showPhoneAuth() {
        debugLog("Показ модального окна авторизации", 'info');
        
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">

                </div>
                <button id="closeAuthBtn" style="background:#3a3a3a;">Закрыть</button>

        document.body.appendChild(modal);
        
        let confirmationResult = null;

        modal.querySelector('#sendCodeBtn').onclick = async () => {
            const phone = modal.querySelector('#phoneNumber').value;

            if (!phone || phone.length < 10) {
                debugLog("Некорректный номер телефона", 'error');
                alert('Введите корректный номер телефона');
                return;
            }
            
            try {
                // Пересоздаем reCAPTCHA перед отправкой
                initRecaptcha();
                
                const appVerifier = recaptchaVerifier;
                confirmationResult = await auth.signInWithPhoneNumber(phone, appVerifier);
                debugLog(`Код отправлен на ${phone}`, 'success');
                
                modal.querySelector('#codeSection').style.display = 'block';
                modal.querySelector('#sendCodeBtn').style.display = 'none';
                alert('Код отправлен! Проверьте SMS');

                debugLog(`Ошибка отправки кода: ${err.message}`, 'error');
                alert('Ошибка: ' + err.message);
                
                // Если ошибка с reCAPTCHA, пробуем переинициализировать
                if (err.message.includes('reCAPTCHA')) {
                    debugLog("Пробуем переинициализировать reCAPTCHA", 'warn');
                    initRecaptcha();
                }
            }
        };
        
        modal.querySelector('#verifyBtn').onclick = async () => {
            const code = modal.querySelector('#verificationCode').value;
            debugLog(`Проверка кода: ${code}`, 'info');
            
            if (!code || code.length < 6) {
                debugLog("Неполный код подтверждения", 'error');
                alert('Введите полный 6-значный код');
                return;
            }
            
            try {
                const result = await confirmationResult.confirm(code);
                currentUser = result.user;
                debugLog(`Пользователь авторизован: ${currentUser.uid}`, 'success');
                
                await loadOrCreateUserData();
                modal.remove();
                setupRealtimeListeners();

        modal.querySelector('#closeAuthBtn').onclick = () => modal.remove();

                channels.push({ id: doc.id, ...doc.data() });

    // ==================== ПОИСК ПОЛЬЗОВАТЕЛЕЙ ====================
    function searchUsers(query) {
        if (!query.trim()) return [];
        query = query.toLowerCase();
        return users.filter(u => 
            u.name.toLowerCase().includes(query) || 
            (u.phone && u.phone.includes(query))
        );
    }
    
    function renderSearchResults(query) {
        const results = searchUsers(query);
        const container = document.getElementById('searchResults');
        if (!query.trim() || results.length === 0) {
            container.innerHTML = '';
            return;
        }
        container.innerHTML = results.map(user => `
            <div class="search-result-item" data-user-id="${user.id}">
                <div class="avatar" style="width:40px;height:40px;">
                    ${user.avatar ? `<img src="${user.avatar}">` : `<span>${user.name?.charAt(0).toUpperCase() || '?'}</span>`}
                </div>
                <div>
                    <div>${escapeHtml(user.name)}</div>
                    <div style="font-size:11px;color:var(--text-muted);">${user.phone || ''}</div>
                </div>
            </div>
        `).join('');
        
        document.querySelectorAll('.search-result-item').forEach(el => {
            el.onclick = () => startChatWithUser(el.dataset.userId);
        });
    }
    
    async function startChatWithUser(userId) {
        debugLog(`Начало чата с пользователем: ${userId}`, 'info');
        
        try {
            // Проверяем существующий чат
            const existingChat = await db.collection('chats')
                .where('participants', 'array-contains', currentUser.uid)
                .get();
            
            let chatId = null;
            for (const doc of existingChat.docs) {
                const participants = doc.data().participants;
                if (participants.includes(userId)) {
                    chatId = doc.id;
                    break;
                }
            }
            
            if (chatId) {
                debugLog(`Существующий чат найден: ${chatId}`, 'success');
                openChat(chatId);
            } else {
                // Создаем новый чат
                const newChat = {
                    participants: [currentUser.uid, userId],
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    lastMessage: '',
                    lastMessageTime: null
                };
                const docRef = await db.collection('chats').add(newChat);
                debugLog(`Создан новый чат: ${docRef.id}`, 'success');
                openChat(docRef.id);
            }
            
            document.getElementById('searchInput').value = '';
            document.getElementById('searchResults').innerHTML = '';
            switchTab('chats');
        } catch(err) {
            debugLog(`Ошибка создания чата: ${err.message}`, 'error');
        }
    }
    
    // ==================== СООБЩЕНИЯ ====================
    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text || !currentChatId) return;
        
        debugLog(`Отправка сообщения в чат ${currentChatId}: ${text.substring(0, 30)}...`, 'info');
        
        const message = {
            text: text,
            senderId: currentUser.uid,
            senderName: currentUserData.name,
            senderAvatar: currentUserData.avatar,
            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
            read: false
        };
        
        try {
            await db.collection('chats').doc(currentChatId).collection('messages').add(message);
            
            // Обновляем последнее сообщение
            await db.collection('chats').doc(currentChatId).update({
                lastMessage: text,
                lastMessageTime: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            input.value = '';
            playBeep(880, 0.1);
            debugLog("Сообщение отправлено", 'success');
        } catch(err) {
            debugLog(`Ошибка отправки сообщения: ${err.message}`, 'error');
        }
    }
    
    function openChat(chatId) {
        debugLog(`Открытие чата: ${chatId}`, 'info');
        
        if (unsubscribeMessages) unsubscribeMessages();
        currentChatId = chatId;
        currentChannelId = null;
        
        // Слушаем сообщения
        unsubscribeMessages = db.collection('chats').doc(chatId).collection('messages')

        document.getElementById('channelSettingsBtn').style.display = 'none';

        document.getElementById('messageInput').disabled = false;

    async function renderChatHeader(chatId) {
        try {
            const chatDoc = await db.collection('chats').doc(chatId).get();
            if (!chatDoc.exists) return;
            
            const participants = chatDoc.data().participants;
            const otherUserId = participants.find(p => p !== currentUser.uid);
            const otherUser = users.find(u => u.id === otherUserId);
            
            if (otherUser) {
                document.getElementById('chatName').innerText = otherUser.name;
                document.getElementById('chatAvatar').innerHTML = otherUser.avatar ? `<img src="${otherUser.avatar}">` : otherUser.name.charAt(0).toUpperCase();
                document.getElementById('peerStatus').innerHTML = otherUser.online ? '🟢 В сети' : '⚪ Не в сети';
            }
        } catch(err) {
            debugLog(`Ошибка загрузки заголовка чата: ${err.message}`, 'error');
        }
    }
    
    function renderMessages(messages) {
        const container = document.getElementById('messagesArea');
        if (messages.length === 0) {
            container.innerHTML = '<div style="text-align:center;color:var(--text-muted);margin-top:60px;">💬 Напишите первое сообщение!</div>';
            return;
        }
        container.innerHTML = '';
        messages.forEach(doc => {
            const msg = doc.data();
            const isOutgoing = msg.senderId === currentUser.uid;
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isOutgoing ? 'outgoing' : 'incoming'}`;
            const time = msg.timestamp?.toDate().toLocaleTimeString().slice(0,5) || '';
            
            if (!isOutgoing && msg.senderName) {
                msgDiv.innerHTML = `
                    <div class="message-author" data-user-id="${msg.senderId}" data-user-name="${escapeHtml(msg.senderName)}" data-user-avatar="${msg.senderAvatar || ''}">
                        <div class="avatar" style="width:24px;height:24px;font-size:12px;">${msg.senderAvatar ? `<img src="${msg.senderAvatar}">` : (msg.senderName?.charAt(0) || '👤')}</div>
                        <div class="message-author-name">${escapeHtml(msg.senderName)}</div>
                    </div>
                    <div class="message-text">${escapeHtml(msg.text)}</div>
                    <div class="message-time">${time}</div>
                `;
                const authorDiv = msgDiv.querySelector('.message-author');
                authorDiv.onclick = (e) => {
                    e.stopPropagation();
                    const user = users.find(u => u.id === msg.senderId);
                    showUserProfile(msg.senderId, msg.senderName, msg.senderAvatar, user?.bio || '');
                };
            } else {
                msgDiv.innerHTML = `
                    <div class="message-text">${escapeHtml(msg.text)}</div>
                    <div class="message-time">${time}</div>
                `;
            }
            container.appendChild(msgDiv);
        });
        container.scrollTop = container.scrollHeight;
    }
    
    async function renderChatsList() {
        const container = document.getElementById('chatsList');
        try {
            const snapshot = await db.collection('chats')
                .where('participants', 'array-contains', currentUser.uid)
                .orderBy('lastMessageTime', 'desc')
                .get();
            
            if (snapshot.empty) {
                container.innerHTML = '<div class="no-items">✨ Нет чатов<br>Найдите друга по номеру телефона</div>';
                return;
            }
            
            container.innerHTML = '';
            for (const doc of snapshot.docs) {
                const chat = doc.data();
                const otherUserId = chat.participants.find(p => p !== currentUser.uid);
                const otherUser = users.find(u => u.id === otherUserId);
                if (!otherUser) continue;
                
                const div = document.createElement('div');
                div.className = `chat-item ${currentChatId === doc.id ? 'active' : ''}`;
                div.innerHTML = `
                    <div class="chat-avatar" style="position:relative;">
                        ${otherUser.avatar ? `<img src="${otherUser.avatar}">` : `<span>${otherUser.name?.charAt(0).toUpperCase() || '?'}</span>`}
                        ${otherUser.online ? '<div class="online-dot"></div>' : ''}
                    </div>
                    <div class="chat-details">
                        <div class="chat-name">${escapeHtml(otherUser.name)}</div>
                        <div class="chat-last-msg">${escapeHtml(chat.lastMessage || 'Новый чат')}</div>
                    </div>
                `;
                div.onclick = () => openChat(doc.id);
                container.appendChild(div);
            }
        } catch(err) {
            debugLog(`Ошибка загрузки списка чатов: ${err.message}`, 'error');
            container.innerHTML = '<div class="no-items">⚠️ Ошибка загрузки чатов</div>';
        }
    }

        const modal = document.createElement('div');
        modal.className = 'modal';

    async function openChannel(channelId) {
        debugLog(`Открытие канала: ${channelId}`, 'info');
        
        currentChannelId = channelId;
        currentChatId = null;
        if (unsubscribeMessages) unsubscribeMessages();
        
        const channel = channels.find(c => c.id === channelId);
        if (!channel) return;
        
        const isOwner = channel.ownerId === currentUser.uid;
        const isSubscribed = subscribedChannels.has(channelId);
        const canPost = !channel.onlyOwnerCanPost || isOwner;
        
        document.getElementById('chatName').innerText = '📢 ' + channel.name;
        document.getElementById('chatAvatar').innerHTML = channel.avatar ? `<img src="${channel.avatar}">` : '📢';
        document.getElementById('peerStatus').innerHTML = `👥 ${channel.subscribers?.length || 0} подписчиков • ${isOwner ? '👑 Создатель' : '📢 Подписчик'}`;
        
        const subscribeBtn = document.getElementById('subscribeChannelBtn');
        subscribeBtn.style.display = 'block';
        subscribeBtn.innerText = isSubscribed ? '❌ Отписаться' : '📢 Подписаться';
        subscribeBtn.className = isSubscribed ? 'subscribe-btn subscribed' : 'subscribe-btn';
        
        const channelSettingsBtn = document.getElementById('channelSettingsBtn');
        channelSettingsBtn.style.display = isOwner ? 'flex' : 'none';
        
        document.getElementById('callButtons').style.display = 'flex';
        document.getElementById('inputArea').style.display = 'flex';
        
        const messageInput = document.getElementById('messageInput');
        if (!canPost && !isSubscribed) {
            messageInput.disabled = true;
            messageInput.placeholder = "🔒 Подпишитесь на канал чтобы писать";
        } else if (!canPost && isSubscribed) {
            messageInput.disabled = true;
            messageInput.placeholder = "🔒 Только создатель может писать";
        } else {
            messageInput.disabled = false;
            messageInput.placeholder = "Сообщение в канал...";
        }
        
        // Слушаем сообщения канала
        unsubscribeMessages = db.collection('channels').doc(channelId).collection('posts')
            .orderBy('timestamp', 'asc')
            .onSnapshot((snapshot) => {
                renderChannelMessages(snapshot.docs);
            });
        
        renderChannelsList();
    }
    
    async function subscribeToChannel(channelId) {
        debugLog(`Подписка/отписка от канала: ${channelId}`, 'info');
        
        const channel = channels.find(c => c.id === channelId);
        if (!channel) return;
        
        try {
            if (subscribedChannels.has(channelId)) {
                await db.collection('users').doc(currentUser.uid).collection('subscriptions').doc(channelId).delete();
                subscribedChannels.delete(channelId);
                if (channel.subscribers) {
                    channel.subscribers = channel.subscribers.filter(id => id !== currentUser.uid);
                }
                playBeep(440, 0.2);
                debugLog("Отписка успешна", 'success');
            } else {
                await db.collection('users').doc(currentUser.uid).collection('subscriptions').doc(channelId).set({ subscribedAt: firebase.firestore.FieldValue.serverTimestamp() });
                subscribedChannels.add(channelId);
                if (!channel.subscribers) channel.subscribers = [];
                if (!channel.subscribers.includes(currentUser.uid)) {
                    channel.subscribers.push(currentUser.uid);
                }
                playBeep(660, 0.2);
                debugLog("Подписка успешна", 'success');
            }
            
            await db.collection('channels').doc(channelId).update({ subscribers: channel.subscribers });
            
            if (currentChannelId === channelId) {
                const isSubscribed = subscribedChannels.has(channelId);
                const subscribeBtn = document.getElementById('subscribeChannelBtn');
                subscribeBtn.innerText = isSubscribed ? '❌ Отписаться' : '📢 Подписаться';
                subscribeBtn.className = isSubscribed ? 'subscribe-btn subscribed' : 'subscribe-btn';
                document.getElementById('peerStatus').innerHTML = `👥 ${channel.subscribers?.length || 0} подписчиков • ${channel.ownerId === currentUser.uid ? '👑 Создатель' : '📢 Подписчик'}`;
                
                const canPost = !channel.onlyOwnerCanPost || channel.ownerId === currentUser.uid;
                const messageInput = document.getElementById('messageInput');
                if (!canPost && isSubscribed) {
                    messageInput.disabled = true;
                    messageInput.placeholder = "🔒 Только создатель может писать";
                } else if (canPost) {
                    messageInput.disabled = false;
                    messageInput.placeholder = "Сообщение в канал...";
                }
            }
            
            renderChannelsList();
        } catch(err) {
            debugLog(`Ошибка подписки: ${err.message}`, 'error');
        }
    }
    
    async function sendToChannel() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text || !currentChannelId) return;
        
        const channel = channels.find(c => c.id === currentChannelId);
        if (!channel) return;
        
        const isOwner = channel.ownerId === currentUser.uid;
        const canPost = !channel.onlyOwnerCanPost || isOwner;
        const isSubscribed = subscribedChannels.has(currentChannelId);
        
        if (!isSubscribed) {
            alert("Вы не подписаны на этот канал!");
            return;
        }
        
        if (!canPost) {
            alert("Только создатель канала может писать сообщения!");
            return;
        }
        
        debugLog(`Отправка поста в канал ${currentChannelId}: ${text.substring(0, 30)}...`, 'info');
        
        const post = {
            text: text,
            authorId: currentUser.uid,
            authorName: currentUserData.name,
            authorAvatar: currentUserData.avatar,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };
        
        try {
            await db.collection('channels').doc(currentChannelId).collection('posts').add(post);
            input.value = '';
            playBeep(880, 0.1);
            debugLog("Пост отправлен", 'success');
        } catch(err) {
            debugLog(`Ошибка отправки поста: ${err.message}`, 'error');
        }
    }
    
    function renderChannelMessages(messages) {
        const container = document.getElementById('messagesArea');
        if (messages.length === 0) {
            container.innerHTML = '<div style="text-align:center;color:var(--text-muted);margin-top:60px;">📢 Нет постов<br>Напишите первое сообщение в канал!</div>';
            return;
        }
        container.innerHTML = '';
        messages.forEach(doc => {
            const msg = doc.data();
            const isOutgoing = msg.authorId === currentUser.uid;
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isOutgoing ? 'outgoing' : 'incoming'}`;
            const time = msg.timestamp?.toDate().toLocaleTimeString().slice(0,5) || '';
            msgDiv.innerHTML = `
                <div class="message-author" data-user-id="${msg.authorId}" data-user-name="${escapeHtml(msg.authorName)}" data-user-avatar="${msg.authorAvatar || ''}">
                    <div class="avatar" style="width:24px;height:24px;font-size:12px;">${msg.authorAvatar ? `<img src="${msg.authorAvatar}">` : (msg.authorName?.charAt(0) || '👤')}</div>
                    <div class="message-author-name">${escapeHtml(msg.authorName)}</div>
                </div>
                <div class="message-text">${escapeHtml(msg.text)}</div>
                <div class="message-time">${time}</div>
            `;
            const authorDiv = msgDiv.querySelector('.message-author');
            authorDiv.onclick = (e) => {
                e.stopPropagation();
                const user = users.find(u => u.id === msg.authorId);
                showUserProfile(msg.authorId, msg.authorName, msg.authorAvatar, user?.bio || '');
            };
            container.appendChild(msgDiv);
        });
        container.scrollTop = container.scrollHeight;
    }
    
    function renderChannelsList() {
        const container = document.getElementById('channelsList');
        if (channels.length === 0) {
            container.innerHTML = '<div class="no-items">📢 Нет каналов<br>Создайте свой первый канал!</div>';
            return;
        }
        container.innerHTML = '';
        channels.forEach(channel => {
            const isSubscribed = subscribedChannels.has(channel.id);
            const isOwner = channel.ownerId === currentUser.uid;
            const div = document.createElement('div');
            div.className = `channel-item ${currentChannelId === channel.id ? 'active' : ''}`;
            div.innerHTML = `
                <div class="channel-avatar">
                    ${channel.avatar ? `<img src="${channel.avatar}" style="width:100%;height:100%;object-fit:cover;">` : '📢'}
                </div>
                <div class="channel-details">
                    <div class="channel-name">${escapeHtml(channel.name)}${isOwner ? '<span class="role-badge">👑</span>' : ''}</div>
                    <div class="chat-last-msg">👥 ${channel.subscribers?.length || 1} подписчиков</div>
                </div>
                <div style="font-size:12px;">${isSubscribed ? '✅' : ''}</div>
            `;
            div.onclick = () => openChannel(channel.id);
            container.appendChild(div);
        });
    }
    
    async function showChannelSettings() {
        if (!currentChannelId) return;
        const channel = channels.find(c => c.id === currentChannelId);
        if (!channel) return;
        
        if (channel.ownerId !== currentUser.uid) {
            alert("Только создатель канала может изменять настройки");
            return;
        }
        
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h2>📢 Настройки канала</h2>
                <div class="channel-stats">
                    <div>👥 Подписчиков: ${channel.subscribers?.length || 1}</div>
                    <div>👑 Создатель: ${escapeHtml(channel.ownerName)}</div>
                </div>
                <div class="setting-item">
                    <label>📝 Название канала</label>
                    <input type="text" id="editChannelName" value="${escapeHtml(channel.name)}">
                </div>
                <div class="setting-item">
                    <label>📄 Описание канала</label>
                    <textarea id="editChannelDesc" rows="3">${escapeHtml(channel.description || '')}</textarea>
                </div>
                <div class="setting-item">
                    <label>✍️ Кто может писать</label>
                    <select id="editPostPermission">
                        <option value="owner" ${channel.onlyOwnerCanPost !== false ? 'selected' : ''}>👑 Только создатель</option>
                        <option value="all" ${channel.onlyOwnerCanPost === false ? 'selected' : ''}>👥 Все подписчики</option>
                    </select>
                </div>
                <button id="saveChannelSettings">💾 Сохранить</button>
                <button id="deleteChannelBtn" class="danger">🗑️ Удалить канал</button>
                <button id="closeChannelSettings" style="background:#3a3a3a;">Закрыть</button>
            </div>
        `;
        document.body.appendChild(modal);
        
        modal.querySelector('#saveChannelSettings').onclick = async () => {
            try {
                await db.collection('channels').doc(currentChannelId).update({
                    name: modal.querySelector('#editChannelName').value.trim(),
                    description: modal.querySelector('#editChannelDesc').value.trim(),
                    onlyOwnerCanPost: modal.querySelector('#editPostPermission').value === 'owner'
                });
                await loadChannels();
                renderChannelsList();
                if (currentChannelId) openChannel(currentChannelId);
                modal.remove();
                playBeep(880, 0.2);
                debugLog("Настройки канала сохранены", 'success');
            } catch(err) {
                debugLog(`Ошибка сохранения настроек: ${err.message}`, 'error');
            }
        };
        
        modal.querySelector('#deleteChannelBtn').onclick = async () => {
            if (confirm("Вы уверены, что хотите удалить канал?")) {
                try {
                    await db.collection('channels').doc(currentChannelId).delete();
                    await loadChannels();
                    renderChannelsList();
                    modal.remove();
                    currentChannelId = null;
                    document.getElementById('messagesArea').innerHTML = '<div style="text-align:center;color:var(--text-muted);margin-top:60px;">📢 Канал удален</div>';
                    document.getElementById('chatName').innerText = 'Ww Мессенджер';
                    playBeep(440, 0.3);
                    debugLog("Канал удален", 'success');
                } catch(err) {
                    debugLog(`Ошибка удаления канала: ${err.message}`, 'error');
                }
            }
        };
        
        modal.querySelector('#closeChannelSettings').onclick = () => modal.remove();
    }

    function showDrawingModal() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h2>🎨 Нарисовать аватар</h2>
                <canvas id="drawCanvas" width="200" height="200" style="background:white; border-radius:50%; cursor:crosshair; margin:0 auto; display:block;"></canvas>
                <div style="display:flex; gap:10px; margin-top:16px;">
                    <button id="saveDrawBtn">Сохранить</button>
                    <button id="clearDrawBtn">Очистить</button>
                    <button id="cancelDrawBtn">Отмена</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        const canvas = modal.querySelector('#drawCanvas');
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, 200, 200);
        ctx.fillStyle = '#000';
        ctx.font = 'bold 100px sans-serif';
        ctx.fillText('W', 65, 140);
        
        let drawing = false;
        canvas.addEventListener('mousedown', () => drawing = true);
        canvas.addEventListener('mouseup', () => drawing = false);
        canvas.addEventListener('mousemove', (e) => {
            if (!drawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * 200 / rect.width;
            const y = (e.clientY - rect.top) * 200 / rect.height;
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(x, y, 5, 0, Math.PI*2);
            ctx.fill();
        });
        
        modal.querySelector('#clearDrawBtn').onclick = () => {
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, 200, 200);
        };
        modal.querySelector('#saveDrawBtn').onclick = () => {
            currentUserData.avatar = canvas.toDataURL();
            updateUserProfileUI();
            db.collection('users').doc(currentUser.uid).update({ avatar: currentUserData.avatar });
            modal.remove();
            debugLog("Аватар нарисован и сохранен", 'success');
        };
        modal.querySelector('#cancelDrawBtn').onclick = () => modal.remove();
    }

        document.getElementById('userName').innerText = currentUserData.name || 'Пользователь';
        document.getElementById('userBio').innerText = currentUserData.bio || 'Нет описания';
        document.getElementById('userPhone').innerText = currentUser.phoneNumber || '';
        const avatarDiv = document.getElementById('userAvatar');
        if (currentUserData.avatar) {
            avatarDiv.innerHTML = `<img src="${currentUserData.avatar}">`;
        } else {
            avatarDiv.innerHTML = currentUserData.name?.charAt(0).toUpperCase() || 'W';
        }
    }

    // ==================== ЗВОНКИ ====================
    async function startCall(isVideo) {
        if (!currentChatId) { alert("Выберите чат"); return; }
        alert(`📞 ${isVideo ? 'Видео' : 'Аудио'} звонок запущен! (Для полноценных звонков нужен HTTPS)`);

    // ==================== UI ====================
    function switchTab(tab) {
        activeTab = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
        
        if (tab === 'chats') {
            document.getElementById('chatsPanel').style.display = 'flex';
            document.getElementById('channelsPanel').style.display = 'none';
            document.getElementById('searchInput').placeholder = "🔍 Поиск по номеру или имени...";
            renderChatsList();
            if (currentChatId) openChat(currentChatId);
        } else {
            document.getElementById('chatsPanel').style.display = 'none';
            document.getElementById('channelsPanel').style.display = 'flex';
            document.getElementById('searchInput').placeholder = "🔍 Поиск каналов...";
            renderChannelsList();
            if (currentChannelId) openChannel(currentChannelId);
        }
        debugLog(`Переключение на вкладку: ${tab}`, 'info');
    }
    
    function renderAll() {
        updateUserProfileUI();
        renderChatsList();
        renderChannelsList();
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // ==================== ИНИЦИАЛИЗАЦИЯ ====================
    function bindEvents() {
        document.getElementById('sendBtn').onclick = () => {
            if (currentChatId) sendMessage();
            else if (currentChannelId) sendToChannel();
        };
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (currentChatId) sendMessage();
                else if (currentChannelId) sendToChannel();
            }
        });
        document.getElementById('audioCallBtn').onclick = () => startCall(false);
        document.getElementById('videoCallBtn').onclick = () => startCall(true);
        document.getElementById('userProfileBtn').onclick = showEditProfileModal;
        document.getElementById('createChannelBtn').onclick = createChannel;
        document.getElementById('settingsBtn').onclick = showSettingsModal;
        document.getElementById('channelSettingsBtn').onclick = showChannelSettings;
        document.getElementById('subscribeChannelBtn').onclick = () => {
            if (currentChannelId) subscribeToChannel(currentChannelId);
        };
        
        document.querySelectorAll('.tab').forEach(tab => {
            tab.onclick = () => switchTab(tab.dataset.tab);
        });
        
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', (e) => {
            if (activeTab === 'chats') renderSearchResults(e.target.value);
            else {
                const query = e.target.value.toLowerCase();
                const container = document.getElementById('searchResults');
                const filtered = channels.filter(c => c.name.toLowerCase().includes(query));
                if (!query || filtered.length === 0) {
                    container.innerHTML = '';
                    return;
                }
                container.innerHTML = filtered.map(ch => `
                    <div class="search-result-item" data-channel-id="${ch.id}">
                        <div class="avatar" style="width:40px;height:40px;">${ch.avatar ? `<img src="${ch.avatar}">` : '📢'}</div>
                        <div>📢 ${escapeHtml(ch.name)}</div>
                    </div>
                `).join('');
                document.querySelectorAll('[data-channel-id]').forEach(el => {
                    el.onclick = () => {
                        openChannel(el.dataset.channelId);
                        searchInput.value = '';
                        container.innerHTML = '';
                        switchTab('channels');
                    };
                });
            }
        });
    }
    
    debugLog("Приложение запущено, ожидание авторизации...", 'info');
    loadSettings();
    bindEvents();
    
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            debugLog(`Пользователь авторизован: ${user.uid}`, 'success');
            currentUser = user;
            await loadOrCreateUserData();
            await loadUsers();
            await loadChannels();
            renderAll();
            setupRealtimeListeners();
            document.getElementById('connectionStatus').className = 'connection-status online';
            document.getElementById('connectionStatus').innerHTML = '🟢 Онлайн';
        } else {
            debugLog("Пользователь не авторизован, показываем форму входа", 'info');
            showPhoneAuth();
            document.getElementById('connectionStatus').innerHTML = '🔐 Требуется вход';
        }
    });
